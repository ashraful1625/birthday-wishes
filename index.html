<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600;700&family=Josefin+Sans:wght@700&display=swap" rel="stylesheet">
    <title>FOR YOU 💓</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --cream: #fdf6ee;
            --rose:  #c9485b;
            --gold:  #c8963e;
            --text:  #4a2c2a;
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            touch-action: manipulation;
        }

        body.landing-page {
            background: var(--cream);
            font-family: 'Lora', Georgia, serif;
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        body.landing-page::before {
            content: '';
            position: fixed; inset: 0;
            background:
                radial-gradient(ellipse at 15% 15%, rgba(245,198,203,0.35) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 85%, rgba(200,150,62,0.18) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(201,72,91,0.06) 0%, transparent 70%);
            pointer-events: none; z-index: 0;
        }

        /* ══ BALLOON LAYER ══
           z-index raised ABOVE .landing-container (3) so the countdown
           card can never block balloon taps as they rise behind/through it. */
        #balloonLayer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 5;
            overflow: hidden;
        }

        .balloon {
            position: absolute;
            bottom: -180px;
            cursor: pointer;
            pointer-events: all;
            user-select: none;
            -webkit-user-select: none;
            animation: balloonRise linear forwards;
            will-change: transform;
            touch-action: manipulation;
        }

        .balloon svg { display: block; }
        .balloon:active svg { transform: scale(0.9); }

        .balloon-string {
            display: block;
            width: 2px;
            margin: 0 auto;
            background: rgba(100,60,40,0.3);
            border-radius: 1px;
        }

        @keyframes balloonRise {
            0%   { transform: translateX(0)  translateY(0);      opacity: 0; }
            4%   { opacity: 1; }
            20%  { transform: translateX(8px)  translateY(-20vh); }
            40%  { transform: translateX(-8px) translateY(-40vh); }
            60%  { transform: translateX(10px) translateY(-60vh); }
            80%  { transform: translateX(-6px) translateY(-80vh); }
            96%  { opacity: 1; }
            100% { transform: translateX(0)  translateY(-115vh);  opacity: 0; }
        }

        /* Pop burst ring */
        .pop-burst {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%) scale(0);
            animation: burstRing 0.45s ease-out forwards;
        }
        @keyframes burstRing {
            0%   { transform: translate(-50%,-50%) scale(0);   opacity: 1; }
            70%  { transform: translate(-50%,-50%) scale(1.5); opacity: 0.6; }
            100% { transform: translate(-50%,-50%) scale(2.2); opacity: 0; }
        }

        /* Confetti */
        .confetti-piece {
            position: fixed; pointer-events: none;
            z-index: 9999; border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0%   { opacity: 1; }
            100% { opacity: 0; transform: translateY(150px) rotate(400deg); }
        }

        /* ══ WISH TOAST ══ */
        #wishToast {
            position: fixed;
            top: clamp(70px, 14vh, 120px);
            left: 50%;
            transform: translateX(-50%) scale(0.88);
            max-width: min(86vw, 400px);
            width: max-content;
            background: white;
            border-radius: 20px;
            padding: 16px 20px 14px;
            box-shadow: 0 14px 44px rgba(201,72,91,0.22), 0 2px 12px rgba(0,0,0,0.08);
            border: 1.5px solid rgba(201,72,91,0.18);
            text-align: center;
            z-index: 10000;
            pointer-events: none;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.3s, transform 0.35s cubic-bezier(0.34,1.4,0.64,1);
        }
        #wishToast.visible {
            opacity: 1;
            transform: translateX(-50%) scale(1);
        }
        #wishToast::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 4px;
            background: linear-gradient(90deg, var(--rose), var(--gold));
        }
        #wishToast .wish-emoji {
            font-size: clamp(1.4rem, 5vw, 1.8rem);
            display: block; margin-bottom: 6px;
        }
        #wishToast .wish-text {
            font-family: 'Josefin Sans', sans-serif;
            font-weight: 700;
            font-size: clamp(0.82rem, 3.2vw, 1.05rem);
            color: var(--text); line-height: 1.6;
            letter-spacing: 0.03em;
            display: block;
        }
        #wishToast .wish-num {
            font-family: 'Lora', serif;
            font-size: 0.7rem; color: var(--gold);
            font-style: italic; margin-top: 6px;
            display: block;
        }

        /* ══ MAIN CARD ══ */
        .landing-container {
            position: relative; z-index: 3;
            width: 100%; min-height: 100vh; min-height: 100dvh;
            display: flex; align-items: center; justify-content: center;
            padding: 16px;
            pointer-events: none;
        }

        .countdown-wrapper {
            pointer-events: all;
            background: rgba(255,255,255,0.18);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 24px;
            padding: clamp(22px, 5vw, 50px) clamp(16px, 5vw, 50px);
            box-shadow: 0 20px 60px rgba(201,72,91,0.12), 0 4px 20px rgba(0,0,0,0.06);
            border: 1.5px solid rgba(255,255,255,0.35);
            max-width: min(540px, 92vw);
            width: 100%;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: cardIn 0.7s cubic-bezier(0.34,1.4,0.64,1) both;
        }
        .countdown-wrapper::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--rose), var(--gold), var(--rose));
        }
        @keyframes cardIn {
            from { opacity: 0; transform: scale(0.88) translateY(28px); }
            to   { opacity: 1; transform: scale(1)    translateY(0); }
        }

        .landing-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.25rem, 5.5vw, 2.5rem);
            color: var(--rose); font-style: italic;
            line-height: 1.25; margin-bottom: 4px;
        }

        .petal-divider {
            display: block; font-size: 1rem;
            letter-spacing: 5px; opacity: 0.5;
            margin: 8px 0 14px;
        }

        .balloon-hint {
            font-family: 'Lora', serif; font-style: italic;
            font-size: clamp(0.7rem, 2.4vw, 0.85rem);
            color: var(--rose); opacity: 0.8;
            margin-bottom: 14px;
        }

        /* TIMER */
        .countdown-timer {
            display: flex; align-items: center; justify-content: center;
            gap: clamp(3px, 1.8vw, 12px);
            margin-bottom: 16px; flex-wrap: nowrap;
        }
        .timer-unit {
            display: flex; flex-direction: column;
            align-items: center; gap: 3px;
        }
        .timer-value {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.75rem, 7vw, 3.8rem);
            font-weight: 700; color: var(--rose);
            background: rgba(255,255,255,0.28);
            border: 1.5px solid rgba(255,255,255,0.45);
            border-radius: 12px;
            width:  clamp(52px, 13.5vw, 92px);
            height: clamp(52px, 13.5vw, 92px);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 16px rgba(201,72,91,0.10);
            transition: transform 0.15s;
        }
        .timer-label {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(0.68rem, 2vw, 0.9rem);
            color: var(--gold);
        }
        .timer-separator {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 5.5vw, 2.8rem);
            color: var(--rose); opacity: 0.5;
            margin-bottom: 18px;
            animation: blink 1s step-end infinite;
        }
        @keyframes blink {
            0%,100% { opacity: 0.5; } 50% { opacity: 0.1; }
        }

        .landing-subtitle {
            font-family: 'Lora', serif; font-style: italic;
            color: var(--gold);
            font-size: clamp(0.78rem, 2.2vw, 0.95rem);
            margin-top: 4px;
        }

        .popped-badge {
            display: inline-flex; align-items: center; gap: 5px;
            margin-top: 10px;
            background: rgba(255,255,255,0.22);
            border: 1px solid rgba(255,255,255,0.4);
            border-radius: 30px;
            padding: 5px 14px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(0.82rem, 2.3vw, 0.95rem);
            color: var(--rose);
        }

        /* REDIRECT */
        .redirect-container { margin-top: 8px; }
        .celebration-text {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.1rem, 4.5vw, 1.6rem);
            color: var(--rose); margin-bottom: 16px;
        }
        .redirect-button {
            display: inline-block;
            background: linear-gradient(135deg, var(--rose), #8b2252);
            color: white; font-family: 'Dancing Script', cursive;
            font-size: clamp(0.95rem, 3.5vw, 1.2rem); font-weight: 700;
            padding: 12px 30px; border-radius: 50px; text-decoration: none;
            box-shadow: 0 6px 20px rgba(201,72,91,0.35);
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .redirect-button:hover  { transform: translateY(-3px) scale(1.04); }
        .redirect-button:active { transform: scale(0.97); }

        /* ══ AMBIENT LAYER ══ */
        #ambientLayer {
            position: fixed; inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* ── Clouds ── */
        .cloud {
            position: absolute;
            opacity: 0.55;
            animation: cloudDrift linear infinite;
            will-change: transform;
        }
        @keyframes cloudDrift {
            from { transform: translateX(-220px); }
            to   { transform: translateX(calc(100vw + 220px)); }
        }

        /* ── Birds ── */
        .bird-group {
            position: absolute;
            animation: birdFly linear forwards;
            will-change: transform;
        }
        @keyframes birdFly {
            from { transform: translateX(-140px) translateY(0px); opacity: 0; }
            5%   { opacity: 1; }
            50%  { transform: translateX(50vw) translateY(-18px); opacity: 1; }
            95%  { opacity: 1; }
            to   { transform: translateX(calc(100vw + 140px)) translateY(8px); opacity: 0; }
        }
        .bird {
            animation: wingFlap 0.55s ease-in-out infinite alternate;
            display: inline-block;
            transform-origin: center bottom;
        }
        @keyframes wingFlap {
            from { transform: scaleY(1); }
            to   { transform: scaleY(0.45); }
        }

        /* ── Sakura petals ── */
        .sakura {
            position: absolute;
            top: -30px;
            pointer-events: none;
            animation: sakuraFall linear forwards;
            will-change: transform, opacity;
        }
        @keyframes sakuraFall {
            0%   { opacity: 0; transform: translateY(0)   translateX(0)   rotate(0deg); }
            8%   { opacity: 1; }
            40%  { transform: translateY(30vh)  translateX(22px)  rotate(120deg); }
            70%  { transform: translateY(65vh)  translateX(-18px) rotate(260deg); }
            92%  { opacity: 1; }
            100% { opacity: 0; transform: translateY(110vh) translateX(12px) rotate(400deg); }
        }
    </style>
</head>

  ['#c9485b','#f5a0ad'], ['#e8849a','#fcd0da'], ['#8b2252','#d4789a'],

let timerActive = true; // while true, balloons float but can't be popped (keeps the surprise hidden)

const WISH_CYCLE = 20; // only cycle through the first 20 wishes, then repeat

function nextWish() {
    if (wishIdx >= WISH_CYCLE) wishIdx = 0; // loop back to start after 20
    return WISHES[wishIdx++];
}

/* ── SVG Balloon ── */
function mkSVG(col, hi, sz) {
    const w = Math.round(sz * 0.78), h = sz;
    const cx = w/2, cy = h*0.46, rx = w*0.46, ry = h*0.44;
    const uid = col.replace('#','') + sz;
    return `<svg width="${w}" height="${h+12}" viewBox="0 0 ${w} ${h+12}" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g${uid}" cx="36%" cy="30%" r="60%">
          <stop offset="0%"   stop-color="${hi}"  stop-opacity="1"/>
          <stop offset="55%"  stop-color="${col}" stop-opacity="1"/>
          <stop offset="100%" stop-color="${col}" stop-opacity="0.72"/>
        </radialGradient>
      </defs>
      <ellipse cx="${cx}" cy="${cy}" rx="${rx}" ry="${ry}" fill="url(#g${uid})"/>
      <ellipse cx="${cx-rx*.22}" cy="${cy-ry*.28}" rx="${rx*.2}" ry="${ry*.14}" fill="white" opacity="0.42"/>
      <path d="M${cx-3.5},${cy+ry} Q${cx},${cy+ry+9} ${cx+3.5},${cy+ry}" fill="${col}" stroke="${col}" stroke-width="1.2"/>
    </svg>`;
}

/* ── Spawn Balloon ── */
function spawnBalloon() {
    const mobile = window.innerWidth < 600;
    const sz     = mobile ? 50+Math.random()*32 : 65+Math.random()*55;
    const [col,hi] = BCOLORS[Math.floor(Math.random()*BCOLORS.length)];
    const strH   = sz * 0.52;

    const el = document.createElement('div');
    el.className = 'balloon';

    /* Spread across full width — card is centred so balloons appear all around it */
    const leftPct = 2 + Math.random() * 96;
    const dur     = 10 + Math.random() * 11;
    const delay   = Math.random() * 1.5;

    el.style.cssText = `left:${leftPct}%;animation-duration:${dur}s;animation-delay:${delay}s;`;
    el.innerHTML = `${mkSVG(col,hi,sz)}<span class="balloon-string" style="height:${strH}px;"></span>`;

    function pop(e) {
        e.preventDefault(); e.stopPropagation();
        if (timerActive) return; // countdown still running — balloons are just floating decoration for now
        if (el._done) return; el._done = true;

        const r  = el.getBoundingClientRect();
        const cx = r.left + r.width/2;
        const cy = r.top  + r.height/2;

        el.remove();
        doBurst(cx, cy, col);

        poppedCount++;
        poppedEl.textContent = poppedCount;
        showWish(nextWish());
    }

    el.addEventListener('click',      pop, {passive:false});
    el.addEventListener('touchstart', pop, {passive:false});
    el.addEventListener('animationend', () => { if (!el._done) el.remove(); });

    layer.appendChild(el);
}

/* ── Burst effect ── */
function doBurst(cx, cy, col) {
    /* Ring */
    const ring = document.createElement('div');
    ring.className = 'pop-burst';
    ring.style.cssText = `left:${cx}px;top:${cy}px;width:70px;height:70px;border:3px solid ${col};`;
    document.body.appendChild(ring);
    setTimeout(()=>ring.remove(), 480);

    /* Confetti shards */
    const cols = [col,'#f5c6cb','#ffd700','#fff','#c8963e','#764ba2','#ff6b9d','#80c8d4'];
    for (let i=0; i<20; i++) {
        const p   = document.createElement('div');
        p.className = 'confetti-piece';
        const sz  = 5 + Math.random()*7;
        const ang = Math.random()*360;
        const d   = 55 + Math.random()*90;
        const dx  = Math.cos(ang*Math.PI/180)*d;
        const dy  = Math.sin(ang*Math.PI/180)*d - 50;
        p.style.cssText = `left:${cx}px;top:${cy}px;width:${sz}px;height:${sz*(Math.random()>.5?1:2.4)}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${0.6+Math.random()*0.8}s;transform:translate(${dx}px,${dy}px);`;
        document.body.appendChild(p);
        setTimeout(()=>p.remove(), 1600);
    }
}

/* ── Wish toast ── */
function showWish(w) {
    clearTimeout(toastTimer);
    wishToast.classList.remove('visible');

    /* tiny delay so the re-appear transition fires */
    setTimeout(() => {
        toastEmoji.textContent = w.e;
        toastText.textContent  = w.t;
        toastNum.textContent   = '';   /* counter hidden — left empty */
        wishToast.classList.add('visible');
    }, 60);

    toastTimer = setTimeout(() => wishToast.classList.remove('visible'), 5800);
}

/* ── Spawner loop ── */
const MAX_BALLOONS = window.innerWidth < 600 ? 10 : 16;

function countBalloons() { return layer.querySelectorAll('.balloon').length; }

/* Initial wave */
const initCount = Math.min(6, MAX_BALLOONS);
for (let i=0; i<initCount; i++) setTimeout(spawnBalloon, i*350);

setInterval(() => {
    if (countBalloons() < MAX_BALLOONS) spawnBalloon();
}, 1200);

/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
   🎯 EDIT THE BIRTHDAY DATE/TIME HERE — nothing else needed.
   Use NORMAL Bangladesh (BST) calendar numbers:
     month: 1-12 (1=Jan ... 12=Dec)   hour: 0-23 (24-hour clock)
   This always counts down correctly for visitors anywhere in
   the world, no matter what timezone their device is set to.
━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
const BIRTHDAY_BST = {
    year:   2026,
    month:  6,     // 6 = June
    day:    28,
    hour:   22,    // 0 = midnight, 14 = 2 PM, 23 = 11 PM
    minute: 39
};
/* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

/* ══ COUNTDOWN ══ */
function pulseEl(id) {
    const el = document.getElementById(id);
    el.style.transform = 'scale(1.1)';
    setTimeout(()=>el.style.transform='', 160);
}

function updateCountdown() {
    const now  = new Date();
    /* BST is UTC+6 year-round (no daylight saving), so we just
       subtract 6 hours from the BST hour to get the true UTC moment. */
    const bday = new Date(Date.UTC(
        BIRTHDAY_BST.year,
        BIRTHDAY_BST.month - 1,
        BIRTHDAY_BST.day,
        BIRTHDAY_BST.hour - 6,
        BIRTHDAY_BST.minute,
        0
    ));
    const diff = bday - now;

    if (diff > 0) {
        const days    = Math.floor(diff/86400000);
        const hours   = Math.floor((diff/3600000)%24);
        const minutes = Math.floor((diff/60000)%60);
        const seconds = Math.floor((diff/1000)%60);
        const sec2    = String(seconds).padStart(2,'0');
        if (document.getElementById('seconds').textContent !== sec2) {
            pulseEl('seconds');
            if (seconds===59) pulseEl('minutes');
        }
        document.getElementById('days').textContent    = String(days).padStart(2,'0');
        document.getElementById('hours').textContent   = String(hours).padStart(2,'0');
        document.getElementById('minutes').textContent = String(minutes).padStart(2,'0');
        document.getElementById('seconds').textContent = sec2;
    } else {
        document.getElementById('redirectContainer').style.display = 'block';
        document.querySelector('.countdown-timer').style.display   = 'none';
        bigBirthdayConfetti();
    }
}
setInterval(updateCountdown,1000);
updateCountdown();

function bigBirthdayConfetti() {
    const cols=['#c9485b','#f5c6cb','#ffd700','#764ba2','#2e7d5e','#fff','#ff6b9d','#c8963e'];
    for (let i=0;i<90;i++) setTimeout(()=>{
        const el=document.createElement('div');
        el.className='confetti-piece';
        const sz=7+Math.random()*9;
        el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${sz}px;height:${sz*(Math.random()>.5?1:2.5)}px;background:${cols[Math.floor(Math.random()*cols.length)]};animation-duration:${2+Math.random()*2.2}s`;
        document.body.appendChild(el);
        setTimeout(()=>el.remove(),5000);
    }, i*28);
}

/* ── Bird SVG builder ── */
function mkBirdSVG(col) {
    // Simple M-curve silhouette bird
    return `<svg width="22" height="10" viewBox="0 0 22 10" xmlns="http://www.w3.org/2000/svg">
      <path d="M1,6 Q5.5,0 11,5 Q16.5,0 21,6" stroke="${col}" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>`;
}

function spawnBirdGroup() {
    const el    = document.createElement('div');
    el.className = 'bird-group';
    const count = 3 + Math.floor(Math.random() * 4); // 3–6 birds
    const top   = 6 + Math.random() * 30;
    const dur   = 18 + Math.random() * 14;
    const col   = ['#8b5e6a','#6a4a7a','#5a6a8a','#7a6a4a'][Math.floor(Math.random()*4)];
    el.style.cssText = `top:${top}%;animation-duration:${dur}s;display:flex;gap:${6+Math.random()*10}px;align-items:flex-end;`;

    for (let i = 0; i < count; i++) {
        const b = document.createElement('span');
        b.className = 'bird';
        b.innerHTML = mkBirdSVG(col);
        b.style.animationDelay = `${i * 0.12}s`;
        b.style.animationDuration = `${0.45 + Math.random()*0.2}s`;

    amb.appendChild(el);
    el.addEventListener('animationend', () => {
        el.remove();
        setTimeout(spawnBirdGroup, 3000 + Math.random() * 7000);

}
// staggered initial bird waves
for (let i = 0; i < 3; i++) setTimeout(spawnBirdGroup, i * 4500);

/* ── Sakura petal SVG builder ── */
const PETAL_COLORS = ['#f8c8d4','#f5a8bc','#fbd0dc','#fce4ec','#f9b8cc'];

    return `<svg width="14" height="16" viewBox="0 0 14 16" xmlns="http://www.w3.org/2000/svg">
      <ellipse cx="7" cy="9" rx="5.5" ry="7" fill="${col}" opacity="0.88"/>

      <line x1="7" y1="2" x2="7" y2="15" stroke="${col}" stroke-width="0.6" opacity="0.5"/>
    </svg>`;
}

function spawnSakura() {
    const el  = document.createElement('div');
    el.className = 'sakura';
    const col  = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
    const left = Math.random() * 100;
