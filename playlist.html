<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <title>Birthday Playlist 🎵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --cream: #fdf6ee;
            --rose:  #c9485b;
            --gold:  #c8963e;
            --text:  #4a2c2a;
            --light-rose: #fde8ec;
            --light-gold: #fdf0e0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body.playlist-page {
            background: var(--cream);
            font-family: 'Lora', Georgia, serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.playlist-page::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(245,198,203,0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(200,150,62,0.12) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== NAVBAR ========== */
        .playlist-page .navbar {
            position: sticky; top: 0; z-index: 300;
            background: linear-gradient(135deg, #c9485b 0%, #8b2252 100%);
            padding: 12px clamp(12px, 3vw, 20px);
            box-shadow: 0 4px 20px rgba(201,72,91,0.3);
            flex-shrink: 0;
        }
        .playlist-page .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            width: 100%;
        }
        .playlist-page .nav-title {
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            flex-shrink: 0;
        }
        .playlist-page .nav-link {
            color: white; text-decoration: none; font-weight: 600;
            padding: 8px 16px; border: 2px solid rgba(255,255,255,0.7);
            border-radius: 20px; transition: all 0.3s; font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            white-space: nowrap; min-height: 44px; display: flex; align-items: center; flex-shrink: 0;
        }
        .playlist-page .nav-link:hover { background: white; color: var(--rose); }

        /* ========== MAIN CONTAINER ========== */
        .playlist-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(20px, 5vw, 40px) clamp(12px, 3vw, 32px) clamp(40px, 8vw, 80px);
            position: relative; 
            z-index: 1;
            flex: 1;
        }

        .playlist-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            color: var(--rose);
            font-style: italic;
            text-align: center;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .playlist-subtitle {
            text-align: center;
            color: var(--gold);
            font-style: italic;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            margin-bottom: 12px;
            word-break: break-word;
        }

        .petal-divider {
            display: block; margin: 12px auto 28px;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            letter-spacing: clamp(2px, 3vw, 6px);
            opacity: 0.55;
            text-align: center;
        }

        /* ========== CUSTOM PLAYER SECTION ========== */
        .album-section {
            background: white;
            border-radius: 16px;
            padding: clamp(16px, 3vw, 24px);
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(201,72,91,0.1);
            border: 1.5px solid rgba(201,72,91,0.08);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.08s both;
        }

        .album-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--rose), var(--gold));
        }

        .album-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 3vw, 16px);
        }

        .album-art {
            width: min(280px, 90vw);
            height: min(280px, 90vw);
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 8px 30px rgba(201,72,91,0.2);
            border: 3px solid var(--cream);
            animation: rotate 0.3s ease-out;
        }

        .song-info {
            text-align: center;
            width: 100%;
        }

        .current-song-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: var(--rose);
            font-style: italic;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .current-song-artist {
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: var(--gold);
            font-style: italic;
        }

        @keyframes rotate {
            from { transform: rotate(-2deg) scale(0.98); opacity: 0; }
            to { transform: rotate(0) scale(1); opacity: 1; }
        }

        /* ========== CUSTOM PLAYER CARD SECTION (CREAM THEME) ========== */
        .player-card {
            /* Removed black/dark tones; blended cream with a soft rose tint */
            background: linear-gradient(135deg, rgb(253, 246, 238), rgba(201, 72, 91, 0.12));
            border-radius: 20px;
            padding: clamp(16px, 3vw, 28px);
            margin-bottom: 20px;
            /* Softer, lighter shadow for a clean look */
            box-shadow: 0 10px 35px rgba(201, 72, 91, 0.12);
            border: 1.5px solid rgba(201, 72, 91, 0.15);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.08s both;
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 750px;
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--rose), var(--gold));
        }

        .player-card-content {
            display: flex;
            flex-direction: column;
            gap: clamp(14px, 3vw, 20px);
        }

        .player-card-header {
            display: flex;
            gap: clamp(12px, 2.5vw, 16px);
            align-items: flex-start;
        }

        .player-album-art {
            width: clamp(80px, 15vw, 120px);
            height: clamp(80px, 15vw, 120px);
            border-radius: 12px;
            object-fit: cover;
            /* Adjusted shadow to look great on light backgrounds */
            box-shadow: 0 6px 20px rgba(201, 72, 91, 0.15);
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.6);
        }

        .player-song-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            min-width: 0;
        }

        .player-song-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: var(--dark-text); /* Changed from white to dark text */
            font-weight: 700;
            font-style: italic;
            word-break: break-word;
            line-height: 1.2;
        }

        .player-artist-name {
            font-size: clamp(0.8rem, 2.2vw, 0.95rem);
            color: rgba(44, 37, 32, 0.75); /* Adjusted opacity dark text */
            font-style: italic;
            word-break: break-word;
        }

        /* Progress Bar */
        .player-progress-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .player-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(201, 72, 91, 0.15); /* Tinted progress track instead of white */
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(201, 72, 91, 0.05);
        }

        .player-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--rose), var(--gold));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear;
            box-shadow: 0 0 8px rgba(206, 105, 120, 0.5);
        }

        .player-time-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .player-time {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            color: rgba(44, 37, 32, 0.65);
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        /* Player Controls */
        .player-controls-card {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(12px, 3vw, 18px);
            flex-wrap: wrap;
        }

        .control-button {
            background: linear-gradient(135deg, var(--rose), rgba(168, 56, 80, 0));
            color: white;
            border: none;
            width: clamp(44px, 10vw, 56px);
            height: clamp(44px, 10vw, 56px);
            border-radius: 50%;
            font-size: clamp(1.2rem, 2.5vw, 1.5rem);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 12px rgba(201, 72, 91, 0.15);
            flex-shrink: 0;
        }

        .control-button:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 18px rgba(201, 72, 91, 0.35);
        }

        .control-button:active {
            transform: scale(0.95);
        }

        .control-button.play-btn {
            width: clamp(50px, 12vw, 64px);
            height: clamp(50px, 12vw, 64px);
            background: linear-gradient(135deg, var(--gold), rgba(176, 133, 48, 0));
            font-size: clamp(1.4rem, 3vw, 1.8rem);
            box-shadow: 0 4px 12px rgba(200, 149, 62, 0.2);
        }

        .control-button.play-btn:hover {
            box-shadow: 0 6px 20px rgba(200, 149, 62, 0.45);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        
        /* ========== PLAYLIST SECTION ========== */
        .playlist {
            background: white;
            border-radius: 16px;
            padding: clamp(16px, 3vw, 24px);
            box-shadow: 0 4px 15px rgba(201,72,91,0.1);
            border: 1.5px solid rgba(201,72,91,0.08);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.2s both;
        }

        .playlist::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--gold), var(--rose));
        }

        .playlist h3 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            font-style: italic;
            color: var(--rose);
            margin-bottom: 16px;
            text-align: center;
        }

        .playlist-items {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vw, 12px);
        }

        .playlist-item {
            padding: clamp(12px, 2vw, 16px) clamp(14px, 3vw, 18px);
            border-radius: 12px;
            font-family: 'Lora', serif;
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: var(--text);
            background: var(--cream);
            border: 1.5px solid transparent;
            cursor: pointer;
            transition: all 0.22s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: clamp(8px, 2vw, 12px);
            min-height: 48px;
            position: relative;
            overflow: hidden;
        }

        .playlist-item::before {
            content: '🎵';
            font-size: clamp(0.9rem, 2.2vw, 1rem);
            opacity: 0.6;
            flex-shrink: 0;
            transition: all 0.22s ease;
        }

        .playlist-item-content {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .playlist-item-title {
            font-weight: 600;
            word-break: break-word;
        }

        .playlist-item-artist {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            color: rgba(74,44,42,0.6);
            font-style: italic;
        }

        .playlist-item-duration {
            font-size: clamp(0.75rem, 1.8vw, 0.85rem);
            color: var(--gold);
            font-weight: 600;
            flex-shrink: 0;
            font-family: 'Courier New', monospace;
        }

        .playlist-item:hover {
            background: var(--light-rose);
            border-color: rgba(201,72,91,0.25);
            color: var(--rose);
            transform: translateX(4px);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, var(--light-rose), var(--light-gold));
            border-color: rgba(201,72,91,0.35);
            color: var(--rose);
            font-weight: 700;
        }

        .playlist-item.active::before { 
            content: '♪';
            opacity: 1;
            animation: bounce 0.6s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .empty-state {
            padding: clamp(20px, 5vw, 40px);
            text-align: center;
            color: var(--gold);
            font-style: italic;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(201,72,91,0.2);
            border-top-color: var(--rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== RESPONSIVE ADJUSTMENTS ========== */
        @media (max-width: 600px) {
            .playlist-container {
                padding: clamp(16px, 4vw, 24px) clamp(10px, 2.5vw, 16px) clamp(30px, 6vw, 50px);
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .album-art {
                width: min(240px, 85vw);
                height: min(240px, 85vw);
            }

            .player-controls {
                gap: 6px;
            }

            .control-btn {
                padding: 8px 10px;
                font-size: 0.8rem;
                flex: 0 1 calc(50% - 4px);
                min-height: 38px;
            }

            .filter-buttons {
                gap: 6px;
            }

            .filter-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
                flex: 0 1 calc(33.333% - 6px);
            }
        }

        @media (max-width: 400px) {
            .control-btn {
                flex: 0 1 calc(50% - 4px);
                font-size: 0.75rem;
            }

            .filter-btn {
                flex: 0 1 calc(50% - 4px);
            }

            .playlist-item {
                min-height: 44px;
                padding: 10px 12px;
            }
        }


    </style>
</head>

                durationSeconds: 245,
                src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3",
                image: "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23c9485b' width='200' height='200'/%3E%3Ctext x='100' y='100' font-size='80' fill='white' text-anchor='middle' dy='.3em'%3E🎊%3C/text%3E%3C/svg%3E"
            }
        ];

        // ========== STATE MANAGEMENT ==========
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: off, 1: all, 2: one
        let filteredSongs = [...songs];

        // ========== DOM ELEMENTS ==========
        const audio = document.getElementById('playlistAudio');
        const playlistItems = document.getElementById('playlistItems');
        const playerPlayBtn = document.getElementById('playerPlayBtn');
        const playerNextBtn = document.getElementById('playerNextBtn');
        const playerPrevBtn = document.getElementById('playerPrevBtn');
        const playerSongTitle = document.getElementById('playerSongTitle');
        const playerArtistName = document.getElementById('playerArtistName');
        const playerAlbumArt = document.getElementById('playerAlbumArt');
        const playerCurrentTime = document.getElementById('playerCurrentTime');
        const playerDuration = document.getElementById('playerDuration');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');

        // ========== INITIALIZATION ==========
        function init() {
            renderPlaylist(songs);
            loadSong(currentIndex);
            setupEventListeners();
        }

        // ========== RENDER PLAYLIST ==========
        function renderPlaylist(items) {
            if (items.length === 0) {
                playlistItems.innerHTML = '<div class="empty-state">No songs found. Try a different search! 🔍</div>';
                return;
            }

            playlistItems.innerHTML = items.map((song, index) => `
                <div class="playlist-item ${index === currentIndex && items === filteredSongs ? 'active' : ''}" data-id="${song.id}">
                    <div class="playlist-item-content">
                        <div class="playlist-item-title">${song.title}</div>
                        <div class="playlist-item-artist">${song.artist}</div>
                    </div>
                    <div class="playlist-item-duration">${song.duration}</div>
                </div>
            `).join('');

            // Add event listeners to playlist items
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                item.addEventListener('click', (e) => {
                    currentIndex = songs.findIndex(s => s.id === parseInt(item.dataset.id));
                    loadSong(currentIndex);
                    audio.play();
                    isPlaying = true;
                    updatePlayButton();
                    renderPlaylist(filteredSongs);
                });
            });
        }

        // ========== LOAD SONG ==========
        function loadSong(index) {
            const song = songs[index];
            audio.src = song.src;
            playerSongTitle.textContent = song.title;
            playerArtistName.textContent = song.artist;
            playerAlbumArt.src = song.image;
            playerDuration.textContent = song.duration;
        }

        // ========== NEXT/PREV SONG ========== 
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }

        function updatePlayButton() {
            playerPlayBtn.textContent = isPlaying ? 'll' : '▶';
        }

        // ========== NEXT/PREV SONG ==========
        function nextSong() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * songs.length);
            } else {
                currentIndex = (currentIndex + 1) % songs.length;
            }
            loadSong(currentIndex);
            audio.play();
            isPlaying = true;
            updatePlayButton();
            renderPlaylist(filteredSongs);
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            loadSong(currentIndex);
            audio.play();
            isPlaying = true;
            updatePlayButton();
            renderPlaylist(filteredSongs);
        }

        // ========== SETUP EVENT LISTENERS ==========
        function setupEventListeners() {
            // Audio events
            audio.addEventListener('play', () => {
                isPlaying = true;
                updatePlayButton();
            });

            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayButton();
            });

            audio.addEventListener('ended', () => {
                nextSong();
            });

            audio.addEventListener('timeupdate', () => {
                const minutes = Math.floor(audio.currentTime / 60);
                const seconds = Math.floor(audio.currentTime % 60);
                playerCurrentTime.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Update progress bar
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
            });

            audio.addEventListener('loadedmetadata', () => {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                playerDuration.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            });

            // Player controls
            playerPlayBtn.addEventListener('click', togglePlay);
            playerNextBtn.addEventListener('click', nextSong);
            playerPrevBtn.addEventListener('click', prevSong);

            // Progress bar click
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>
