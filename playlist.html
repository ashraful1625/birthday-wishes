<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com"> 
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <title>Birthday Playlist 🎵</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        :root {
            --cream: #fdf6ee;
            --rose:  #c9485b;
            --gold:  #c8963e;
            --text:  #4a2c2a;
            --light-rose: #fde8ec;
            --light-gold: #fdf0e0;
            /* Dynamic "now playing" theme — updated by JS from the album art */
            --theme-c1: var(--rose);
            --theme-c2: var(--gold);
            --theme-shadow: rgba(201, 72, 91, 0.32);
            /* Measured navbar height, used to offset the sticky player card */
            --navbar-h: 64px;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body.playlist-page {
            background: var(--cream);
            font-family: 'Lora', Georgia, serif;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        body.playlist-page::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(245,198,203,0.22) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 80%, rgba(200,150,62,0.12) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* ========== NAVBAR (GLASSMORPHISM) ========== */
        .playlist-page .navbar {
            position: sticky; top: 0; z-index: 300;
            background: linear-gradient(135deg, rgba(201,72,91,0.72) 0%, rgba(139,34,82,0.68) 100%);
            background: linear-gradient(135deg, color-mix(in srgb, var(--theme-c1) 72%, transparent) 0%, color-mix(in srgb, var(--theme-c2) 58%, transparent) 100%);
            backdrop-filter: blur(18px) saturate(160%);
            -webkit-backdrop-filter: blur(18px) saturate(160%);
            border-bottom: 1px solid rgba(255,255,255,0.28);
            padding: 12px clamp(12px, 3vw, 20px);
            box-shadow: 0 4px 24px rgba(74,44,42,0.18);
            transition: background 0.6s ease;
            flex-shrink: 0;
        }
        .playlist-page .nav-container {
            max-width: 1200px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; gap: 12px;
            width: 100%;
        }
        .playlist-page .nav-title {
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            flex-shrink: 0;
            text-shadow: 0 1px 8px rgba(0,0,0,0.15);
        }
        .playlist-page .nav-link {
            color: white; text-decoration: none; font-weight: 600;
            padding: 8px 16px;
            background: rgba(255,255,255,0.16);
            backdrop-filter: blur(8px) saturate(150%);
            -webkit-backdrop-filter: blur(8px) saturate(150%);
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 20px; transition: all 0.3s; font-size: clamp(0.8rem, 2.5vw, 0.9rem);
            white-space: nowrap; min-height: 44px; display: flex; align-items: center; flex-shrink: 0;
        }
        .playlist-page .nav-link:hover { background: rgba(255,255,255,0.9); color: var(--rose); border-color: rgba(255,255,255,0.9); }

        /* ========== MAIN CONTAINER ========== */
        .playlist-container {
            max-width: 800px;
            width: 100%;
            margin: 0 auto;
            padding: clamp(20px, 5vw, 40px) clamp(12px, 3vw, 32px) clamp(40px, 8vw, 80px);
            position: relative; 
            z-index: 1;
            flex: 1;
        }

        .playlist-container h1 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.6rem, 5vw, 2.8rem);
            color: var(--rose);
            font-style: italic;
            text-align: center;
            margin-bottom: 8px;
            word-break: break-word;
        }

        .playlist-subtitle {
            text-align: center;
            color: var(--gold);
            font-style: italic;
            font-size: clamp(0.85rem, 2.2vw, 1rem);
            margin-bottom: 12px;
            word-break: break-word;
        }

        .petal-divider {
            display: block; margin: 12px auto 28px;
            font-size: clamp(0.9rem, 2.5vw, 1.2rem);
            letter-spacing: clamp(2px, 3vw, 6px);
            opacity: 0.55;
            text-align: center;
        }

        /* ========== CUSTOM PLAYER SECTION ========== */
        .album-section {
            background: white;
            border-radius: 16px;
            padding: clamp(16px, 3vw, 24px);
            margin-bottom: 20px;
            box-shadow: 0 4px 15px rgba(201,72,91,0.1);
            border: 1.5px solid rgba(201,72,91,0.08);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.08s both;
        }

        .album-section::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--rose), var(--gold));
        }

        .album-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(12px, 3vw, 16px);
        }

        .album-art {
            width: min(280px, 90vw);
            height: min(280px, 90vw);
            border-radius: 14px;
            object-fit: cover;
            box-shadow: 0 8px 30px rgba(201,72,91,0.2);
            border: 3px solid var(--cream);
            animation: rotate 0.3s ease-out;
        }

        .song-info {
            text-align: center;
            width: 100%;
        }

        .current-song-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            color: var(--rose);
            font-style: italic;
            margin-bottom: 6px;
            word-break: break-word;
        }

        .current-song-artist {
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: var(--gold);
            font-style: italic;
        }

        @keyframes rotate {
            from { transform: rotate(-2deg) scale(0.98); opacity: 0; }
            to { transform: rotate(0) scale(1); opacity: 1; }
        }

        /* ========== CUSTOM PLAYER CARD — GLASSMORPHISM, DYNAMIC THEME ========== */
        .player-card {
            position: sticky;
            top: var(--navbar-h, 64px);
            z-index: 250;
            border-radius: 28px;
            margin-bottom: 20px;
            overflow: hidden;
            isolation: isolate;
            width: 100%;
            max-width: 750px;
            box-shadow:
                0 22px 50px -14px var(--theme-shadow),
                0 4px 16px rgba(74, 44, 42, 0.08);
            animation: fadeUp 0.5s ease-out 0.08s both;
            transition: box-shadow 0.6s ease;
        }

        /* Blurred, color-matched backdrop pulled from the current album art */
        .player-card-backdrop {
            position: absolute;
            inset: -25%;
            width: 150%;
            height: 150%;
            object-fit: cover;
            filter: blur(60px) saturate(170%) brightness(0.92);
            transform: scale(1.05);
            opacity: 0.55;
            transition: opacity 0.4s ease;
            z-index: 0;
        }

        /* Frosted glass layer on top of the backdrop */
        .player-card-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(165deg, rgba(255,255,255,0.82), rgba(255,255,255,0.58));
            background: linear-gradient(165deg, color-mix(in srgb, var(--theme-c1) 14%, white 86%), color-mix(in srgb, var(--theme-c2) 10%, white 90%));
            backdrop-filter: blur(22px) saturate(150%);
            -webkit-backdrop-filter: blur(22px) saturate(150%);
            border: 1px solid rgba(255,255,255,0.55);
            z-index: 1;
            transition: background 0.6s ease;
        }

        .player-card-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: clamp(14px, 3vw, 18px);
            padding: clamp(22px, 6vw, 34px) clamp(18px, 5vw, 28px);
        }

        /* ---- Top large icon: the now-playing artwork ---- */
        .player-art-wrap {
            position: relative;
            width: clamp(160px, 48vw, 220px);
            height: clamp(160px, 48vw, 220px);
            flex-shrink: 0;
        }

        .player-album-art-hero {
            width: 100%;
            height: 100%;
            border-radius: 22px;
            object-fit: cover;
            display: block;
            box-shadow:
                0 16px 38px -8px var(--theme-shadow),
                0 2px 8px rgba(0,0,0,0.12);
            border: 3px solid rgba(255,255,255,0.75);
            transition: box-shadow 0.6s ease;
        }

        .player-card.is-playing .player-album-art-hero {
            animation: artBreathe 4s ease-in-out infinite;
        }

        @keyframes artBreathe {
            0%, 100% { transform: scale(1); }
            50%      { transform: scale(1.025); }
        }

        .player-song-info-hero {
            text-align: center;
            max-width: 100%;
        }

        .player-song-info-hero .player-song-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.15rem, 4vw, 1.5rem);
            color: var(--text);
            font-weight: 700;
            font-style: italic;
            word-break: break-word;
            line-height: 1.25;
        }

        .player-song-info-hero .player-artist-name {
            margin-top: 4px;
            font-size: clamp(0.82rem, 2.4vw, 0.95rem);
            color: rgba(74, 44, 42, 0.65);
            font-style: italic;
            word-break: break-word;
        }

        /* Progress Bar */
        .player-progress-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .player-progress-bar {
            width: 100%;
            height: 6px;
            background: rgba(74, 44, 42, 0.12);
            border-radius: 3px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
        }

        .player-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--theme-c1), var(--theme-c2));
            border-radius: 3px;
            width: 0%;
            transition: width 0.1s linear, background 0.6s ease;
            box-shadow: 0 0 10px var(--theme-shadow);
        }

        .player-time-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }

        .player-time {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            color: rgba(74, 44, 42, 0.55);
            font-family: 'Courier New', monospace;
            font-weight: 600;
        }

        /* Player Controls */
        .player-controls-card {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: clamp(16px, 5vw, 26px);
            flex-wrap: wrap;
        }

        .control-button {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: var(--text);
            border: 1px solid rgba(255,255,255,0.65);
            width: 48px;
            height: 48px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 14px rgba(74, 44, 42, 0.1);
            flex-shrink: 0;
        }

        .control-button svg { display: block; }

        .control-button:hover {
            transform: scale(1.08);
            background: rgba(255,255,255,0.85);
            box-shadow: 0 6px 18px rgba(74, 44, 42, 0.18);
        }

        .control-button:active {
            transform: scale(0.94);
        }

        .control-button.play-btn {
            width: 62px;
            height: 62px;
            background: linear-gradient(135deg, var(--theme-c1), var(--theme-c2));
            color: white;
            border: none;
            box-shadow: 0 10px 26px -4px var(--theme-shadow);
        }

        .control-button.play-btn:hover {
            transform: scale(1.06);
            background: linear-gradient(135deg, var(--theme-c1), var(--theme-c2));
            box-shadow: 0 12px 32px -2px var(--theme-shadow);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        
        /* ========== PLAYLIST SECTION (GLASSMORPHISM) ========== */
        .playlist {
            background: rgba(255,255,255,0.55);
            backdrop-filter: blur(18px) saturate(150%);
            -webkit-backdrop-filter: blur(18px) saturate(150%);
            border-radius: 16px;
            padding: clamp(16px, 3vw, 24px);
            box-shadow: 0 4px 15px rgba(201,72,91,0.1);
            border: 1.5px solid rgba(255,255,255,0.55);
            position: relative;
            overflow: hidden;
            animation: fadeUp 0.5s ease-out 0.2s both;
        }

        .playlist::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--theme-c2), var(--theme-c1));
        }

        .playlist h3 {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.1rem, 3vw, 1.3rem);
            font-style: italic;
            color: var(--rose);
            margin-bottom: 16px;
            text-align: center;
        }

        .playlist-items {
            display: flex;
            flex-direction: column;
            gap: clamp(8px, 1.5vw, 12px);
        }

        .playlist-item {
            padding: clamp(12px, 2vw, 16px) clamp(14px, 3vw, 18px);
            border-radius: 14px;
            font-family: 'Lora', serif;
            font-size: clamp(0.85rem, 2.2vw, 0.95rem);
            color: var(--text);
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(10px) saturate(140%);
            -webkit-backdrop-filter: blur(10px) saturate(140%);
            border: 1.5px solid rgba(255,255,255,0.55);
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: clamp(8px, 2vw, 12px);
            min-height: 48px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 2px 10px rgba(74,44,42,0.05);
        }

        .playlist-item::before {
            content: '🎵';
            font-size: clamp(0.9rem, 2.2vw, 1rem);
            opacity: 0.6;
            flex-shrink: 0;
            transition: all 0.22s ease;
        }

        .playlist-item-content {
            display: flex;
            flex-direction: column;
            gap: 3px;
            flex: 1;
            min-width: 0;
        }

        .playlist-item-title {
            font-weight: 600;
            word-break: break-word;
        }

        .playlist-item-artist {
            font-size: clamp(0.7rem, 1.8vw, 0.8rem);
            color: rgba(74,44,42,0.6);
            font-style: italic;
        }

        .playlist-item-duration {
            font-size: clamp(0.75rem, 1.8vw, 0.85rem);
            color: var(--gold);
            font-weight: 600;
            flex-shrink: 0;
            font-family: 'Courier New', monospace;
        }

        .playlist-item:hover {
            background: rgba(255,255,255,0.7);
            border-color: color-mix(in srgb, var(--theme-c1) 35%, rgba(255,255,255,0.55));
            color: var(--rose);
            transform: translateX(4px);
            box-shadow: 0 6px 18px rgba(74,44,42,0.1);
        }

        .playlist-item.active {
            background: linear-gradient(135deg, var(--light-rose), var(--light-gold));
            background: linear-gradient(135deg, color-mix(in srgb, var(--theme-c1) 20%, white 80%), color-mix(in srgb, var(--theme-c2) 16%, white 84%));
            border-color: var(--theme-c1);
            color: var(--rose);
            font-weight: 700;
            box-shadow: 0 4px 16px var(--theme-shadow);
        }

        .playlist-item.active::before { 
            content: '♪';
            opacity: 1;
            animation: bounce 0.6s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .empty-state {
            padding: clamp(20px, 5vw, 40px);
            text-align: center;
            color: var(--gold);
            font-style: italic;
            font-size: clamp(0.9rem, 2.5vw, 1.1rem);
        }

        /* ========== ANIMATIONS ========== */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(201,72,91,0.2);
            border-top-color: var(--rose);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ========== RESPONSIVE ADJUSTMENTS ========== */
        @media (max-width: 600px) {
            .playlist-container {
                padding: clamp(16px, 4vw, 24px) clamp(10px, 2.5vw, 16px) clamp(30px, 6vw, 50px);
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .album-art {
                width: min(240px, 85vw);
                height: min(240px, 85vw);
            }

            .player-controls {
                gap: 6px;
            }

            .control-btn {
                padding: 8px 10px;
                font-size: 0.8rem;
                flex: 0 1 calc(50% - 4px);
                min-height: 38px;
            }

            .filter-buttons {
                gap: 6px;
            }

            .filter-btn {
                padding: 6px 10px;
                font-size: 0.75rem;
                flex: 0 1 calc(33.333% - 6px);
            }
        }

        @media (max-width: 400px) {
            .control-btn {
                flex: 0 1 calc(50% - 4px);
                font-size: 0.75rem;
            }

            .filter-btn {
                flex: 0 1 calc(50% - 4px);
            }

            .playlist-item {
                min-height: 44px;
                padding: 10px 12px;
            }
        }

        /* ========== DESKTOP TWO-COLUMN LAYOUT ========== */
        /* Below this width the layout stays the mobile single-column stack untouched. */
        @media (min-width: 880px) {
            .playlist-container {
                max-width: 1100px;
            }

            .player-layout {
                display: flex;
                align-items: flex-start;
                gap: clamp(28px, 4vw, 44px);
            }

            /* Player card: fixed width, pinned to the left while the list scrolls */
            .player-layout .player-card {
                flex: 0 0 380px;
                width: 380px;
                max-width: 380px;
                margin-bottom: 0;
                position: sticky;
                top: var(--navbar-h, 64px);
            }

            /* Song list: takes remaining width, its own panel scrolls independently */
            .player-layout .playlist {
                flex: 1;
                min-width: 0;
                position: sticky;
                top: var(--navbar-h, 64px);
                max-height: calc(100vh - var(--navbar-h, 64px) - 32px);
                z-index: 240;
                display: flex;
                flex-direction: column;
            }

            .player-layout .playlist h3 {
                flex-shrink: 0;
            }

            .player-layout .playlist-items {
                overflow-y: auto;
                padding-right: 8px;
                flex: 1;
                scrollbar-width: thin;
                scrollbar-color: var(--theme-c1) transparent;
            }

            .player-layout .playlist-items::-webkit-scrollbar {
                width: 6px;
            }
            .player-layout .playlist-items::-webkit-scrollbar-thumb {
                background: var(--theme-c1);
                border-radius: 10px;
            }
            .player-layout .playlist-items::-webkit-scrollbar-track {
                background: transparent;
            }
        }


    </style>
</head>
<body class="playlist-page">
    <nav class="navbar">
        <div class="nav-container">
            <h2 class="nav-title">🎵 Birthday Playlist</h2>
            <a href="dashboard.html" class="nav-link">← Back</a>
        </div>
    </nav>

    <div class="playlist-container">
        <h1></h1>
        <p class="playlist-subtitle">Songs picked with love, just for your special day ✨</p>
        <span class="petal-divider">🌸 ✦ 🌸 ✦ 🌸</span>

        <!-- Hidden audio element -->
        <audio id="playlistAudio" style="display: none;">
            <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
        </audio>

        <div class="player-layout">
        <!-- CUSTOM PLAYER CARD -->
        <div class="player-card" id="playerCard">
            <img class="player-card-backdrop" id="playerCardBackdrop" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23c9485b' width='200' height='200'/%3E%3C/svg%3E" alt="" aria-hidden="true">
            <div class="player-card-overlay"></div>

            <div class="player-card-content">
                <!-- Top large icon: now-playing artwork -->
                <div class="player-art-wrap">
                    <img id="playerAlbumArt" class="player-album-art-hero" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'%3E%3Crect fill='%23c9485b' width='200' height='200'/%3E%3Ctext x='150' y='100' font-size='80' fill='white' text-anchor='middle' dy='.3em'%3E🎵%3C/text%3E%3C/svg%3E" alt="Album Art">
                </div>

                <div class="player-song-info-hero">
                    <div class="player-song-title" id="playerSongTitle">Kothin Tomake Chara Ekdin</div>
                    <div class="player-artist-name" id="playerArtistName">Popular Romantic Song</div>
                </div>

                <!-- Progress Bar -->
                <div class="player-progress-section">
                    <div class="player-progress-bar" id="progressBar">
                        <div class="player-progress-fill" id="progressFill"></div>
                    </div>
                    <div class="player-time-display">
                        <span class="player-time" id="playerCurrentTime">0:00</span>
                        <span class="player-time" id="playerDuration">0:00</span>
                    </div>
                </div>

                <!-- Player Controls -->
                <div class="player-controls-card">
                    <button class="control-button" id="playerPrevBtn" title="Previous" aria-label="Previous">
                        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h2v12H6zM9.5 12l9-6v12z"/></svg>
                    </button>

        // ========== STATE MANAGEMENT ==========
        let currentIndex = 0;
        let isPlaying = false;
        let isShuffle = false;
        let repeatMode = 0; // 0: off, 1: all, 2: one
        let filteredSongs = [...songs];

        // ========== DOM ELEMENTS ==========
        const audio = document.getElementById('playlistAudio');
        const playlistItems = document.getElementById('playlistItems');
        const playerPlayBtn = document.getElementById('playerPlayBtn');
        const playerNextBtn = document.getElementById('playerNextBtn');
        const playerPrevBtn = document.getElementById('playerPrevBtn');
        const playerSongTitle = document.getElementById('playerSongTitle');
        const playerArtistName = document.getElementById('playerArtistName');
        const playerAlbumArt = document.getElementById('playerAlbumArt');
        const playerCurrentTime = document.getElementById('playerCurrentTime');
        const playerDuration = document.getElementById('playerDuration');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const playerCard = document.getElementById('playerCard');
        const playerCardBackdrop = document.getElementById('playerCardBackdrop');
        const playIcon = document.getElementById('playIcon');
        const pauseIcon = document.getElementById('pauseIcon');

        // ========== INITIALIZATION ==========
        function init() {
            renderPlaylist(songs);
            loadSong(currentIndex);
            setupEventListeners();
            syncNavbarHeight();
        }

        // Keep the player card's sticky offset matched to the real navbar height
        function syncNavbarHeight() {
            const navbar = document.querySelector('.navbar');
            if (!navbar) return;
            document.documentElement.style.setProperty('--navbar-h', navbar.offsetHeight + 'px');
        }
        window.addEventListener('resize', syncNavbarHeight);
        window.addEventListener('load', syncNavbarHeight);

        // ========== RENDER PLAYLIST ==========
        function renderPlaylist(items) {
            if (items.length === 0) {
                playlistItems.innerHTML = '<div class="empty-state">No songs found. Try a different search! 🔍</div>';
                return;
            }

            playlistItems.innerHTML = items.map((song, index) => `
                <div class="playlist-item ${index === currentIndex && items === filteredSongs ? 'active' : ''}" data-id="${song.id}">
                    <div class="playlist-item-content">
                        <div class="playlist-item-title">${song.title}</div>
                        <div class="playlist-item-artist">${song.artist}</div>
                    </div>
                    <div class="playlist-item-duration">${song.duration}</div>
                </div>
            `).join('');

            // Add event listeners to playlist items
            document.querySelectorAll('.playlist-item').forEach((item, idx) => {
                item.addEventListener('click', (e) => {
                    currentIndex = songs.findIndex(s => s.id === parseInt(item.dataset.id));
                    loadSong(currentIndex);
                    audio.play();
                    isPlaying = true;
                    updatePlayButton();
                    renderPlaylist(filteredSongs);
                });
            });
        }

        // ========== LOAD SONG ==========
        function loadSong(index) {
            const song = songs[index];
            audio.src = song.src;
            playerSongTitle.textContent = song.title;
            playerArtistName.textContent = song.artist;
            playerAlbumArt.src = song.image;
            playerDuration.textContent = song.duration;

            // Crossfade the blurred "now playing" backdrop
            playerCardBackdrop.style.opacity = 0;
            setTimeout(() => {
                playerCardBackdrop.onload = () => { playerCardBackdrop.style.opacity = 0.55; };
                playerCardBackdrop.src = song.image;
            }, 180);

            // Re-theme the card glow/progress/buttons from the artwork's colors
            extractThemeColor(song.image);
        }

        // ========== DYNAMIC THEME FROM ALBUM ART ==========
        function extractThemeColor(src) {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                try {
                    const size = 32;
                    const canvas = document.createElement('canvas');
                    canvas.width = size; canvas.height = size;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, size, size);
                    const data = ctx.getImageData(0, 0, size, size).data;

                    let rSum = 0, gSum = 0, bSum = 0, count = 0;
                    let bestSat = -1, ar = 0, ag = 0, ab = 0;

                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i], g = data[i + 1], b = data[i + 2], a = data[i + 3];
                        if (a < 120) continue;
                        rSum += r; gSum += g; bSum += b; count++;

                        const mx = Math.max(r, g, b), mn = Math.min(r, g, b);
                        const sat = mx === 0 ? 0 : (mx - mn) / mx;
                        if (sat > bestSat && mx > 50) { bestSat = sat; ar = r; ag = g; ab = b; }
                    }
                    if (!count) throw new Error('no readable pixels');

                    const avgR = Math.round(rSum / count), avgG = Math.round(gSum / count), avgB = Math.round(bSum / count);
                    if (bestSat < 0) { ar = avgR; ag = avgG; ab = avgB; }

                    applyThemeColors(`rgb(${avgR},${avgG},${avgB})`, `rgb(${ar},${ag},${ab})`, `rgba(${ar},${ag},${ab},0.4)`);
                } catch (e) {
                    resetThemeColors();
                }
            };
            img.onerror = resetThemeColors;
            img.src = src;
        }

        function applyThemeColors(c1, c2, shadow) {
            const root = document.documentElement.style;
            root.setProperty('--theme-c1', c1);
            root.setProperty('--theme-c2', c2);
            root.setProperty('--theme-shadow', shadow);
        }

        function resetThemeColors() {
            applyThemeColors('var(--rose)', 'var(--gold)', 'rgba(201,72,91,0.32)');
        }

        // ========== NEXT/PREV SONG ========== 
        function togglePlay() {
            if (isPlaying) {
                audio.pause();
            } else {
                audio.play();
            }
        }

        function updatePlayButton() {
            playIcon.style.display = isPlaying ? 'none' : 'block';
            pauseIcon.style.display = isPlaying ? 'block' : 'none';
            playerPlayBtn.title = isPlaying ? 'Pause' : 'Play';
            playerPlayBtn.setAttribute('aria-label', isPlaying ? 'Pause' : 'Play');
            playerCard.classList.toggle('is-playing', isPlaying);
        }

        // ========== NEXT/PREV SONG ==========
        function nextSong() {
            if (isShuffle) {
                currentIndex = Math.floor(Math.random() * songs.length);
            } else {
                currentIndex = (currentIndex + 1) % songs.length;
            }
            loadSong(currentIndex);
            audio.play();
            isPlaying = true;
            updatePlayButton();
            renderPlaylist(filteredSongs);
        }

        function prevSong() {
            currentIndex = (currentIndex - 1 + songs.length) % songs.length;
            loadSong(currentIndex);
            audio.play();
            isPlaying = true;
            updatePlayButton();
            renderPlaylist(filteredSongs);
        }

        // ========== SETUP EVENT LISTENERS ==========
        function setupEventListeners() {
            // Audio events
            audio.addEventListener('play', () => {
                isPlaying = true;
                updatePlayButton();
            });

            audio.addEventListener('pause', () => {
                isPlaying = false;
                updatePlayButton();
            });

            audio.addEventListener('ended', () => {
                nextSong();
            });

            audio.addEventListener('timeupdate', () => {
                const minutes = Math.floor(audio.currentTime / 60);
                const seconds = Math.floor(audio.currentTime % 60);
                playerCurrentTime.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
                
                // Update progress bar
                const percent = (audio.currentTime / audio.duration) * 100;
                progressFill.style.width = percent + '%';
            });

            audio.addEventListener('loadedmetadata', () => {
                const minutes = Math.floor(audio.duration / 60);
                const seconds = Math.floor(audio.duration % 60);
                playerDuration.textContent = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            });

            // Player controls
            playerPlayBtn.addEventListener('click', togglePlay);
            playerNextBtn.addEventListener('click', nextSong);
            playerPrevBtn.addEventListener('click', prevSong);

            // Progress bar click
            progressBar.addEventListener('click', (e) => {
                const rect = progressBar.getBoundingClientRect();
                const percent = (e.clientX - rect.left) / rect.width;
                audio.currentTime = percent * audio.duration;
            });

            // Keyboard shortcuts
            document.addEventListener('keydown', (e) => {
                if (e.code === 'Space') {
                    e.preventDefault();
                    togglePlay();
                }
                if (e.code === 'ArrowRight') nextSong();
                if (e.code === 'ArrowLeft') prevSong();
            });
        }

        // Start the app
        init();
    </script>
</body>
</html>
