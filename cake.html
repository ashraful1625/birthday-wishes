<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Birthday Cake - Cut & Blow the Candle | For My Love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Lora:ital,wght@0,400;0,600;1,400&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream: #fdf6ee;
            --rose:  #c9485b;
            --gold:  #c8963e;
            --text:  #4a2c2a;
        }

        html, body {
            margin: 0; padding: 0;
            height: 100%; width: 100%;
            overflow: hidden;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Lora', Georgia, serif;
            display: flex;
            flex-direction: column;
        }

        #canvas-wrapper {
            position: relative;
            flex: 1 1 0;
            min-height: 0;
            overflow: hidden;
        }

        /* ── NAVBAR ── */
        .navbar {
            flex-shrink: 0;
            background: linear-gradient(135deg, #c9485b 0%, #8b2252 100%);
            padding: 10px 16px;
            box-shadow: 0 4px 20px rgba(201,72,91,0.35);
            z-index: 300;
        }
        .nav-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
        }
        .nav-title {
            color: white;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.1rem, 4vw, 1.7rem);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .nav-link {
            color: white;
            text-decoration: none;
            font-weight: 600;
            padding: 7px 15px;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 0.88rem;
            white-space: nowrap;
            min-height: 40px;
            display: flex;
            align-items: center;
            background: transparent;
            cursor: pointer;
            font-family: 'Lora', serif;
        }
        .nav-link:hover { background: white; color: var(--rose); }

        /* ── MESSAGE OVERLAY (bottom centre) ── */
        .message-overlay {
            position: absolute;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            pointer-events: none;
            z-index: 20;
            background: rgba(253,246,238,0.18);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(201,72,91,0.25);
            border-radius: 50px;
            padding: 10px 22px;
            max-width: 90vw;
            width: max-content;
        }

        .message-overlay h1 {
            margin: 0 0 2px;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(1.05rem, 4vw, 1.75rem);
            color: #fff0e6;
            letter-spacing: 1.5px;
            text-shadow: 0 2px 12px rgba(201,72,91,0.5);
            white-space: nowrap;
        }

        .message-overlay p {
            margin: 0;
            font-family: 'Lora', serif;
            font-size: clamp(0.65rem, 2vw, 0.85rem);
            color: rgba(255,240,220,0.8);
            font-style: italic;
            white-space: nowrap;
        }

        /* ── SLICE COUNTER (top right) ── */
        .cut-info {
            position: absolute;
            top: 16px;
            right: 16px;
            background: rgba(253,246,238,0.16);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1.5px solid rgba(200,150,62,0.35);
            padding: 8px 18px;
            border-radius: 40px;
            color: #fde8ec;
            font-family: 'Dancing Script', cursive;
            font-size: clamp(0.9rem, 3vw, 1.15rem);
            letter-spacing: 0.5px;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 4px 16px rgba(0,0,0,0.2);
            white-space: nowrap;
        }
        .cut-info span {
            color: #f5c6cb;
            font-size: clamp(1.1rem, 3.5vw, 1.4rem);
            font-weight: 800;
        }

        /* ── BOTTOM BAR — centered blow button ── */
        .bottom-bar {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 14px 16px;
            background: linear-gradient(to top, rgba(10,10,20,0.55) 0%, transparent 100%);
            pointer-events: none;
        }
        .bottom-bar > * { pointer-events: auto; }

        /* blow button */
        .blow-btn {
            background: linear-gradient(135deg, var(--rose) 0%, #8b2252 100%);
            border: 1.5px solid rgba(255,255,255,0.18);
            color: white;
            font-family: 'Dancing Script', cursive;
            font-weight: 700;
            font-size: clamp(1rem, 3.5vw, 1.25rem);
            padding: 12px 32px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(201,72,91,0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            letter-spacing: 0.5px;
            min-height: 48px;
            white-space: nowrap;
        }
        .blow-btn:hover  { transform: scale(1.07) translateY(-2px); box-shadow: 0 8px 28px rgba(201,72,91,0.65); }
        .blow-btn:active { transform: scale(0.97); }

        /* ── INSTRUCTION ABOVE CAKE ── */
        .cake-instruction {
            position: absolute;
            top: 16px; left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            background: rgba(253,246,238,0.15);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(201,72,91,0.25);
            border-radius: 30px;
            padding: 7px 20px;
            color: rgba(255,240,220,0.9);
            font-family: 'Lora', serif;
            font-style: italic;
            font-size: clamp(0.7rem, 2vw, 0.88rem);
            white-space: nowrap;
            pointer-events: none;
            transition: opacity 0.6s ease;
        }
        .cake-instruction.hidden { opacity: 0; pointer-events: none; }

        /* ── SPARKLE & SMOKE ── */
        @keyframes floatGlow {
            0%   { transform: translateY(0) scale(1);  opacity: 0.9; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }
        .sparkle {
            position: absolute;
            width: 7px; height: 7px;
            background: radial-gradient(circle, #f5c6cb, #c9485b);
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: floatGlow 1s ease-out forwards;
        }
        .smoke-particle {
            position: absolute;
            width: 20px; height: 20px;
            background: radial-gradient(circle, rgba(253,246,238,0.6), rgba(200,150,62,0));
            border-radius: 50%;
            pointer-events: none;
            z-index: 25;
            animation: riseSmoke 2s ease-out forwards;
        }
        @keyframes riseSmoke {
            0%   { transform: translateY(0) scale(0.5); opacity: 0.6; }
            100% { transform: translateY(-150px) scale(2); opacity: 0; }
        }

        @media (max-width: 600px) {
            .cut-info { top: 10px; right: 10px; padding: 6px 12px; font-size: 0.82rem; }
            .cut-info span { font-size: 1rem; }
            .blow-btn { padding: 10px 22px; font-size: 0.95rem; }
            .cake-instruction { font-size: 0.68rem; padding: 5px 14px; top: 10px; }
        }
    </style>
</head>
<body>
    <!-- ── NAVBAR ── -->
    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-title">🎂 Birthday Cake</span>
            <a href="javascript:history.back()" class="nav-link">← Back</a>
        </div>
    </nav>

    <div id="canvas-wrapper">

    <div class="cut-info">
        🍰 Slices Cut: <span id="sliceCount">0</span>
    </div>

    <div id="cake-instruction" class="cake-instruction">🕯️ Blow the candle first to cut the cake</div>

    <div class="bottom-bar">
        <button id="blowCandleBtn" class="blow-btn">Blow Candle</button>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

        // --- Setup Scene, Cameras, Renderers ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111a2e);
        scene.fog = new THREE.FogExp2(0x111a2e, 0.012);

        const wrapper = document.getElementById('canvas-wrapper');
        function W() { return wrapper.clientWidth; }
        function H() { return wrapper.clientHeight; }
        
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(W(), H());
        renderer.shadowMap.enabled = false;
        renderer.setPixelRatio(window.devicePixelRatio);
        wrapper.appendChild(renderer.domElement);
        
        const labelRenderer = new CSS2DRenderer();
        labelRenderer.setSize(W(), H());
        labelRenderer.domElement.style.position = 'absolute';
        labelRenderer.domElement.style.top = '0px';
        labelRenderer.domElement.style.left = '0px';
        labelRenderer.domElement.style.pointerEvents = 'none';
        wrapper.appendChild(labelRenderer.domElement);
        
        // --- Camera ---
        const camera = new THREE.PerspectiveCamera(42, W() / H(), 0.1, 1000);
        camera.position.set(5, 3.8, 6.5);
        camera.lookAt(0, 1.5, 0);
        
        // --- Controls ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.06;
        controls.rotateSpeed = 1.2;
        controls.zoomSpeed = 1.0;
        controls.panSpeed = 0.8;
        controls.target.set(0, 1.6, 0);
        
        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x404060, 0.65);
        scene.add(ambientLight);
        
        const mainLight = new THREE.DirectionalLight(0xfff5e0, 1.3);
        mainLight.position.set(4, 7, 3);
        mainLight.castShadow = true;
        mainLight.receiveShadow = true;
        mainLight.shadow.mapSize.width = 1024;
        mainLight.shadow.mapSize.height = 1024;
        mainLight.shadow.camera.near = 0.5;
        mainLight.shadow.camera.far = 12;
        mainLight.shadow.camera.left = -5;
        mainLight.shadow.camera.right = 5;
        mainLight.shadow.camera.top = 5;
        mainLight.shadow.camera.bottom = -5;
        scene.add(mainLight);
        
        const fillLight = new THREE.PointLight(0xd4a373, 0.55);
        fillLight.position.set(0, -0.5, 0);
        scene.add(fillLight);
        
        const rimLight = new THREE.PointLight(0xffaa77, 0.65);
        rimLight.position.set(-2.5, 2.5, -3);
        scene.add(rimLight);
        
        const frontFill = new THREE.PointLight(0xffcc99, 0.45);
        frontFill.position.set(1.2, 2, 2.8);
        scene.add(frontFill);
        
        // Candle light (dynamic)
        const candleLight = new THREE.PointLight(0xff8844, 1.0, 9);
        candleLight.castShadow = true;
        candleLight.shadow.mapSize.width = 512;
        candleLight.shadow.mapSize.height = 512;
        scene.add(candleLight);
        
        // --- Table Setup ---
        const tableMat = new THREE.MeshStandardMaterial({ color: 0xc7a47b, roughness: 0.7, metalness: 0.1 });
        const tableTop = new THREE.Mesh(new THREE.CylinderGeometry(2.8, 2.8, 0.2, 32), tableMat);
        tableTop.position.y = -0.1;
        tableTop.castShadow = true;
        tableTop.receiveShadow = true;
        scene.add(tableTop);
        
        const tableLegMat = new THREE.MeshStandardMaterial({ color: 0x9b7a54, roughness: 0.8 });
        for (let i = 0; i < 4; i++) {
            const angle = (i / 4) * Math.PI * 2;
            const x = Math.cos(angle) * 2.1;
            const z = Math.sin(angle) * 2.1;
            const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.18, 0.22, 0.6, 8), tableLegMat);
            leg.position.set(x, -0.5, z);
            leg.castShadow = true;
            scene.add(leg);
        }
        
        // Ground plane shadow catcher
        const groundPlane = new THREE.Mesh(
            new THREE.PlaneGeometry(10, 10),
            new THREE.ShadowMaterial({ opacity: 0.35, color: 0x000000, transparent: true, side: THREE.DoubleSide })
        );
        groundPlane.rotation.x = -Math.PI / 2;
        groundPlane.position.y = -0.45;
        groundPlane.receiveShadow = true;
        scene.add(groundPlane);
        
        // --- Cake dimensions ---
        const bottomRadius = 1.28;
        const bottomHeight = 0.48;
        const topRadius = 1.0;
        const topHeight = 0.42;
        const icingHeight = 0.13;
        const maxSlices = 8;
        const sliceAngle = (Math.PI * 2) / maxSlices;
        const cakeTopY = bottomHeight + 0.09 + topHeight + icingHeight;

        // Materials
        const cakeMatBody  = new THREE.MeshStandardMaterial({ color: 0xe8b56e, roughness: 0.28, metalness: 0.08, side: THREE.DoubleSide });
        const cakeInnerMat = new THREE.MeshStandardMaterial({ color: 0xd4874a, roughness: 0.45, side: THREE.DoubleSide });
        const icingMat     = new THREE.MeshStandardMaterial({ color: 0xfff2e6, roughness: 0.2, emissive: 0xffddbb, emissiveIntensity: 0.05, side: THREE.DoubleSide });
        const creamMat     = new THREE.MeshStandardMaterial({ color: 0xffe5cc, roughness: 0.45, side: THREE.DoubleSide });
        const spongeCapMat = new THREE.MeshStandardMaterial({ color: 0xd4874a, roughness: 0.5, side: THREE.DoubleSide });
        const creamCapMat  = new THREE.MeshStandardMaterial({ color: 0xffe5cc, roughness: 0.45, side: THREE.DoubleSide });
        const icingCapMat  = new THREE.MeshStandardMaterial({ color: 0xfff2e6, roughness: 0.2, side: THREE.DoubleSide });
        const sprinkleColors = [0xffaa66, 0xff6f61, 0xd4af37, 0xcd5c5c, 0x9b59b6, 0x6a9eff];

        // --- Create the Cake Group ---
        const cakeGroup = new THREE.Group();
        scene.add(cakeGroup);

        // Helper: build a triangle fan disc (pie-wedge flat cap)
        function makeDiscCap(radius, tStart, tLen, segments) {
            const geo = new THREE.BufferGeometry();
            const verts = [];
            const step = tLen / segments;
            // centre vertex
            verts.push(0, 0, 0);
            for (let s = 0; s <= segments; s++) {
                const a = tStart + s * step;
                verts.push(Math.cos(a) * radius, 0, Math.sin(a) * radius);
            }
            const indices = [];
            for (let s = 0; s < segments; s++) {
                indices.push(0, s + 1, s + 2);
            }
            geo.setAttribute('position', new THREE.Float32BufferAttribute(verts, 3));
            geo.setIndex(indices);
            geo.computeVertexNormals();
            return geo;
        }

        // Each slice = wedge group with inner disc caps so the centre is always filled
        const sliceMeshes = [];

        function buildSliceGroup(i) {
            const tStart   = i * sliceAngle;
            const tLen     = sliceAngle;
            const seg      = 10;
            const capSeg   = 8;
            const midAngle = tStart + tLen / 2;
            const g = new THREE.Group();

            // ── Bottom tier wedge ──
            const bt = new THREE.Mesh(
                new THREE.CylinderGeometry(bottomRadius, bottomRadius, bottomHeight, seg, 1, false, tStart, tLen),
                [cakeMatBody, cakeInnerMat, cakeMatBody]
            );
            bt.position.y = bottomHeight / 2;
            g.add(bt);

            // Bottom tier inner disc cap (fills the hollow centre when neighbouring slices gone)
            const btCapGeo = makeDiscCap(bottomRadius * 0.999, tStart, tLen, capSeg);
            // top cap
            const btCapTop = new THREE.Mesh(btCapGeo, spongeCapMat);
            btCapTop.rotation.x = -Math.PI / 2;
            btCapTop.position.y = bottomHeight;
            g.add(btCapTop);
            // bottom cap
            const btCapBot = new THREE.Mesh(btCapGeo, spongeCapMat);
            btCapBot.rotation.x = Math.PI / 2;
            btCapBot.position.y = 0;
            g.add(btCapBot);

            // ── Cream band wedge ──
            const cr = new THREE.Mesh(
                new THREE.CylinderGeometry(bottomRadius + 0.04, bottomRadius + 0.04, 0.09, seg, 1, false, tStart, tLen),
                [creamMat, creamCapMat, creamMat]
            );
            cr.position.y = bottomHeight + 0.02;
            g.add(cr);
            // cream band caps
            const crCapGeo = makeDiscCap((bottomRadius + 0.04) * 0.999, tStart, tLen, capSeg);
            const crCapTop = new THREE.Mesh(crCapGeo, creamCapMat);
            crCapTop.rotation.x = -Math.PI / 2;
            crCapTop.position.y = bottomHeight + 0.065;
            g.add(crCapTop);
            const crCapBot = new THREE.Mesh(crCapGeo, creamCapMat);
            crCapBot.rotation.x = Math.PI / 2;
            crCapBot.position.y = bottomHeight - 0.025;
            g.add(crCapBot);

            // ── Top tier wedge ──
            const tt = new THREE.Mesh(
                new THREE.CylinderGeometry(topRadius, topRadius, topHeight, seg, 1, false, tStart, tLen),
                [cakeMatBody, cakeInnerMat, cakeMatBody]
            );
            tt.position.y = bottomHeight + 0.09 + topHeight / 2;
            g.add(tt);
            // top tier caps
            const ttCapGeo = makeDiscCap(topRadius * 0.999, tStart, tLen, capSeg);
            const ttCapTop = new THREE.Mesh(ttCapGeo, spongeCapMat);
            ttCapTop.rotation.x = -Math.PI / 2;
            ttCapTop.position.y = bottomHeight + 0.09 + topHeight;
            g.add(ttCapTop);
            const ttCapBot = new THREE.Mesh(ttCapGeo, spongeCapMat);
            ttCapBot.rotation.x = Math.PI / 2;
            ttCapBot.position.y = bottomHeight + 0.09;
            g.add(ttCapBot);

            // ── Icing wedge ──
            const ic = new THREE.Mesh(
                new THREE.CylinderGeometry(topRadius + 0.06, topRadius + 0.09, icingHeight, seg, 1, false, tStart, tLen),
                [icingMat, icingCapMat, icingMat]
            );
            ic.position.y = bottomHeight + 0.09 + topHeight + icingHeight / 2;
            g.add(ic);
            // icing caps
            const icCapGeo = makeDiscCap((topRadius + 0.06) * 0.999, tStart, tLen, capSeg);
            const icCapTop = new THREE.Mesh(icCapGeo, icingCapMat);
            icCapTop.rotation.x = -Math.PI / 2;
            icCapTop.position.y = cakeTopY;
            g.add(icCapTop);
            const icCapBot = new THREE.Mesh(icCapGeo, icingCapMat);
            icCapBot.rotation.x = Math.PI / 2;
            icCapBot.position.y = bottomHeight + 0.09 + topHeight;
            g.add(icCapBot);

            // ── Sprinkles on top ──
            for (let s = 0; s < Math.round(180 / maxSlices); s++) {
                const a = tStart + Math.random() * tLen;
                const r = topRadius * (0.18 + Math.random() * 0.72);
                const sp = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.045, 0.045, 0.07, 6),
                    new THREE.MeshStandardMaterial({ color: sprinkleColors[Math.floor(Math.random() * sprinkleColors.length)] })
                );
                sp.position.set(Math.cos(a) * r, cakeTopY - 0.01, Math.sin(a) * r);
                sp.rotation.z = Math.random() * Math.PI;
                g.add(sp);
            }

            // ── Rosette ──
            const rosette = new THREE.Mesh(
                new THREE.SphereGeometry(0.085, 16, 16),
                new THREE.MeshStandardMaterial({ color: 0xffb3b3 })
            );
            rosette.position.set(Math.cos(midAngle) * 0.32, cakeTopY, Math.sin(midAngle) * 0.32);
            g.add(rosette);

            return g;
        }

        for (let i = 0; i < maxSlices; i++) {
            const g = buildSliceGroup(i);
            cakeGroup.add(g);
            sliceMeshes.push({ group: g, alive: true, index: i });
        }

        // --- Candle and Flame System ---
        const candleGroup = new THREE.Group();
        const candleMatC = new THREE.MeshStandardMaterial({ color: 0xfff8ec, emissive: 0xffaa77, emissiveIntensity: 0.12 });
        const candleBody = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.14, 0.68, 32), candleMatC);
        candleGroup.add(candleBody);

        const wick = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.025, 0.09, 6), new THREE.MeshStandardMaterial({ color: 0x331100 }));
        wick.position.y = 0.35;
        candleGroup.add(wick);

        const flameMat = new THREE.MeshStandardMaterial({ color: 0xff6600, emissive: 0xff4400, emissiveIntensity: 0.95 });
        const flame = new THREE.Mesh(new THREE.ConeGeometry(0.095, 0.22, 24), flameMat);
        flame.position.y = 0.41;
        candleGroup.add(flame);

        const innerFlame = new THREE.Mesh(new THREE.SphereGeometry(0.05, 12, 12), new THREE.MeshStandardMaterial({ color: 0xffaa55, emissive: 0xff6600, emissiveIntensity: 1.2 }));
        innerFlame.position.y = 0.44;
        candleGroup.add(innerFlame);

        candleGroup.position.set(0, cakeTopY - 0.04, 0);
        cakeGroup.add(candleGroup);
        
        // --- Candle Blow Logic ---
        let isCandleLit = true;
        let blowAnimationActive = false;
        const blowBtn = document.getElementById('blowCandleBtn');
        const instrEl = document.getElementById('cake-instruction');

        function addSmokeBurst() {
            for (let i = 0; i < 30; i++) {
                const smoke = document.createElement('div');
                smoke.classList.add('smoke-particle');
                const xOff = (Math.random() - 0.5) * 80;
                const yOff = (Math.random() * 40);
                smoke.style.left = `calc(50% + ${xOff}px)`;
                smoke.style.top  = `calc(50% + ${yOff}px - 100px)`;
                wrapper.appendChild(smoke);
                setTimeout(() => smoke.remove(), 2000);
            }
        }

        function blowOutCandle() {
            if (!isCandleLit) return;
            isCandleLit = false;
            blowAnimationActive = true;

            // Hide instruction label then show cut hint
            instrEl.classList.add('hidden');
            setTimeout(() => {
                instrEl.textContent = '✂️ Tap a slice to cut it!';
                instrEl.classList.remove('hidden');
                setTimeout(() => instrEl.classList.add('hidden'), 4000);
            }, 600);

            const duration = 400;
            const startTime = performance.now();

            function animateBlow(now) {
                const t = Math.min(1, (now - startTime) / duration);
                const scale = 1 - t;
                flame.scale.set(scale, scale, scale);
                innerFlame.scale.set(scale, scale, scale);
                flame.material.emissiveIntensity = 0.95 * (1 - t);
                innerFlame.material.emissiveIntensity = 1.2 * (1 - t);
                candleLight.intensity = 1.0 * (1 - t);
                if (t < 1) {
                    requestAnimationFrame(animateBlow);
                } else {
                    flame.visible = false;
                    innerFlame.visible = false;
                    candleLight.intensity = 0;
                    blowAnimationActive = false;
                    const wishMsg = document.createElement('div');
                    wishMsg.textContent = '🎈 Make a Wish, My Love! 🎈✨';
                    wishMsg.style.cssText = `position:absolute;top:30%;left:50%;transform:translateX(-50%);
                        background:rgba(253,246,238,0.18);backdrop-filter:blur(14px);
                        border:1.5px solid rgba(201,72,91,0.35);color:#fff0e6;
                        padding:14px 30px;border-radius:60px;font-size:1.4rem;
                        font-family:'Dancing Script',cursive;font-weight:700;z-index:100;
                        text-shadow:0 2px 10px rgba(201,72,91,0.5);white-space:nowrap;pointer-events:none;`;
                    wrapper.appendChild(wishMsg);
                    setTimeout(() => wishMsg.remove(), 3500);
                }
            }
            requestAnimationFrame(animateBlow);
            addSmokeBurst();
            for (let i = 0; i < 40; i++) {
                setTimeout(() => {
                    const spark = document.createElement('div');
                    spark.classList.add('sparkle');
                    spark.style.left = `${Math.random() * W()}px`;
                    spark.style.top  = `${Math.random() * H()}px`;
                    wrapper.appendChild(spark);
                    setTimeout(() => spark.remove(), 1000);
                }, i * 30);
            }
        }

        blowBtn.addEventListener('click', () => {
            if (isCandleLit) {
                blowOutCandle();
            } else {
                const msg = document.createElement('div');
                msg.textContent = '💖 Your wish is on its way! 💖';
                msg.style.cssText = `position:absolute;bottom:18%;left:50%;transform:translateX(-50%);
                    background:rgba(253,246,238,0.18);backdrop-filter:blur(12px);
                    border:1.5px solid rgba(200,150,62,0.35);padding:10px 24px;border-radius:40px;
                    color:#fff0e6;font-family:'Dancing Script',cursive;font-weight:700;
                    font-size:1.1rem;z-index:100;white-space:nowrap;pointer-events:none;`;
                wrapper.appendChild(msg);
                setTimeout(() => msg.remove(), 2000);
            }
        });
        
        // --- SLICE CLICK MECHANICS ---
        let sliceCount = 0;
        const sliceCounterElem = document.getElementById('sliceCount');
        const raycaster = new THREE.Raycaster();

        function showPopup(text, yPos) {
            const el = document.createElement('div');
            el.textContent = text;
            el.style.cssText = `position:absolute;left:50%;transform:translateX(-50%);
                top:${yPos};background:rgba(253,246,238,0.18);backdrop-filter:blur(12px);
                border:1.5px solid rgba(201,72,91,0.3);padding:10px 24px;border-radius:40px;
                font-family:'Dancing Script',cursive;font-weight:700;font-size:1.1rem;
                color:#fff0e6;z-index:100;white-space:nowrap;pointer-events:none;`;
            wrapper.appendChild(el);
            setTimeout(() => el.remove(), 2200);
        }

        function addSparkles() {
            for (let i = 0; i < 22; i++) {
                const spark = document.createElement('div');
                spark.classList.add('sparkle');
                spark.style.left = `${Math.random() * W()}px`;
                spark.style.top  = `${Math.random() * H()}px`;
                wrapper.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }

        function animateFlyOff(sliceEntry, midAngle) {
            const g = sliceEntry.group;
            // Detach from cakeGroup, add to scene preserving world position
            cakeGroup.remove(g);
            scene.add(g);

            const startPos = g.position.clone();
            const outDir   = new THREE.Vector3(Math.cos(midAngle), 0, Math.sin(midAngle));
            const targetPos = startPos.clone().add(
                new THREE.Vector3(outDir.x * 2.5, 1.6, outDir.z * 2.5)
            );
            const startRot = { x: g.rotation.x, z: g.rotation.z };
            const startTime = performance.now();
            const duration  = 600;

            function step(now) {
                const t    = Math.min(1, (now - startTime) / duration);
                const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
                g.position.lerpVectors(startPos, targetPos, ease);
                g.rotation.x = startRot.x + ease * Math.PI * 0.6;
                g.rotation.z = startRot.z + ease * Math.PI * 0.4;
                if (t < 1) {
                    requestAnimationFrame(step);
                } else {
                    scene.remove(g);
                    g.children.forEach(c => { if (c.isMesh) c.geometry.dispose(); });
                }
            }
            requestAnimationFrame(step);
        }

        function onCakeClick(event) {
            // Block cutting until candle is blown out
            if (isCandleLit) {
                const msg = document.createElement('div');
                msg.textContent = '🕯️ Blow out the candle first!';
                msg.style.cssText = `position:absolute;top:30%;left:50%;transform:translateX(-50%);
                    background:rgba(253,246,238,0.18);backdrop-filter:blur(12px);
                    border:1.5px solid rgba(201,72,91,0.3);padding:10px 24px;border-radius:40px;
                    font-family:'Dancing Script',cursive;font-weight:700;font-size:1.1rem;
                    color:#fff0e6;z-index:100;white-space:nowrap;pointer-events:none;`;
                wrapper.appendChild(msg);
                setTimeout(() => msg.remove(), 1800);
                return;
            }

            const aliveSlices = sliceMeshes.filter(s => s.alive);
            if (aliveSlices.length === 0) {
                showPopup('🍰 All slices shared! Happy Birthday! 🎂', '45%');
                return;
            }

            const mouse = new THREE.Vector2();
            const rect  = renderer.domElement.getBoundingClientRect();
            mouse.x =  ((event.clientX - rect.left) / rect.width)  * 2 - 1;
            mouse.y = -((event.clientY - rect.top)  / rect.height) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const meshList = [];
            aliveSlices.forEach(s => s.group.children.forEach(m => { if (m.isMesh) meshList.push(m); }));
            const intersects = raycaster.intersectObjects(meshList, false);
            if (intersects.length === 0) return;

            const hitMesh = intersects[0].object;
            const hitSlice = aliveSlices.find(s => s.group.children.includes(hitMesh));
            if (!hitSlice) return;

            hitSlice.alive = false;
            sliceCount++;
            sliceCounterElem.textContent = sliceCount;

            const midAngle = hitSlice.index * sliceAngle + sliceAngle / 2;
            animateFlyOff(hitSlice, midAngle);
            addSparkles();

            cakeGroup.position.y = 0.03;
            setTimeout(() => { cakeGroup.position.y = 0; }, 130);

            if (sliceCount === 4) showPopup('💕 Each slice is sweeter with you! 💕', '28%');
            if (aliveSlices.length === 1) showPopup('🎂 Last slice! Make it count! 🎂', '28%');
        }

        wrapper.addEventListener('click', onCakeClick, false);

        // --- Animated Background Stars ---
        const starField = new THREE.Points(
            new THREE.BufferGeometry(),
            new THREE.PointsMaterial({ color: 0xffccaa, size: 0.045 })
        );
        const starCount = 600;
        const starPositions = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            starPositions[i*3] = (Math.random() - 0.5) * 45;
            starPositions[i*3+1] = (Math.random() - 0.5) * 12 + 1.5;
            starPositions[i*3+2] = (Math.random() - 0.5) * 28 - 12;
        }
        starField.geometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
        scene.add(starField);
        
        // --- Animation Loop & Flame Flicker (if lit)---
        let timeAnim = 0;
        
        function animate() {
            requestAnimationFrame(animate);
            timeAnim += 0.022;
            
            if (isCandleLit && !blowAnimationActive) {
                const flicker = 0.75 + Math.sin(timeAnim * 28) * 0.18;
                flame.scale.set(1, flicker, 1);
                innerFlame.scale.set(1, 0.85 + Math.sin(timeAnim * 35) * 0.2, 1);
                flame.material.emissiveIntensity = 0.85 + Math.sin(timeAnim * 30) * 0.35;
                innerFlame.material.emissiveIntensity = 1.1 + Math.sin(timeAnim * 38) * 0.45;
                candleLight.intensity = 0.9 + Math.sin(timeAnim * 20) * 0.28;
            } else if (!isCandleLit && !blowAnimationActive) {
                flame.visible = false;
                innerFlame.visible = false;
                candleLight.intensity = 0;
            }
            
            // Gentle floating stars
            starField.rotation.y += 0.0015;
            starField.rotation.x = Math.sin(timeAnim * 0.12) * 0.08;
            
            controls.update();
            renderer.render(scene, camera);
            labelRenderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = W() / H();
            camera.updateProjectionMatrix();
            renderer.setSize(W(), H());
            labelRenderer.setSize(W(), H());
        });
        
        console.log("🎂 Happy Birthday! Cut cake & blow the candle!");
    </script>
    </div><!-- end #canvas-wrapper -->
</body>
</html>
