<!DOCTYPE html> 
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🎂 A Special Birthday Cake</title>
<meta property="og:title" content="🎂 Niharika Niha has a birthday surprise for you!">
<meta property="og:description" content="Open to receive your special slice of the birthday cake 💖">
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Lora:wght@400;600&display=swap" rel="stylesheet">
<!-- THREE.js UMD build — works from local file, no ES module needed -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js">
// (Inside initCake function, replace the cutBtn event listener and startLayer function with these:)

function startLayer(li){
  curLayer = li; 
  cutting = true;
  // REMOVED: layerGrps[li].visible = false; 
  // REMOVED: sliceGrps[li].visible = true;
  
  if(li === 2) candleGrp.visible = false;
  showLI(`✂️ ${LAYER_NAMES[li]} (${CAKE[li].slices} slices) — tap Cut!`);
}

cutBtn.addEventListener('click', () => {
  if(!blown){showSt('🕯️ Blow the candle first!', 2000); return;}
  const li = curLayer;
  if(li < 0){showSt('🎂 All layers cut! Enjoy! 🎊', 3000); cutBtn.disabled = true; return;}
  if(!cutting) startLayer(li);
  
  // Get the slice from the hidden group, make it visible, then animate it
  const idx = prog[li];
  if(idx < CAKE[li].slices) {
    const sg3 = sliceGrps[li].children[idx];
    sg3.visible = true; // Make the specific wedge visible
    animQ.push({g: sg3, tx: sg3.userData.tx, tz: sg3.userData.tz, p: 0});
    prog[li]++;
    setTimeout(() => openShare(li, idx + 1), 700);
  }

  const p = prog[li], tot = CAKE[li].slices;
  showLI(`✂️ ${LAYER_NAMES[li]}: ${p}/${tot} slices`);
  
  if(p >= tot){
    setTimeout(() => {
      const nx = li - 1;
      if(nx >= 0){
        curLayer = nx; 
        cutting = false; 
        showSt(`🎉 ${LAYER_NAMES[li]} done! Cut next! `, 2800);
        showLI(`🎂 Next: ${LAYER_NAMES[nx]} (${CAKE[nx].slices} slices) — tap Cut!`);
      } else {
        curLayer = -1; cutting = false; cutBtn.disabled = true; hideLI();
        showSt('🎊 All layers cut! Happy Birthday! 🎂✨', 4500);
      }
    }, 400);
  }
});

</script>
<style>
:root{--rose:#c9485b;--gold:#c8963e;--dark:#111a2e;}
html,body{margin:0;padding:0;height:100%;width:100%;overflow:hidden;background:var(--dark);}

.action-btn{background:linear-gradient(135deg,var(--rose),#8b2252);border:1.5px solid rgba(255,255,255,.18);color:#fff;font-family:'Dancing Script',cursive;font-weight:700;font-size:clamp(.9rem,3.2vw,1.15rem);padding:10px 22px;border-radius:50px;cursor:pointer;box-shadow:0 4px 20px rgba(201,72,91,.5);transition:transform .2s,box-shadow .2s,opacity .3s;min-height:44px;white-space:nowrap;}
.action-btn:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 8px 28px rgba(201,72,91,.65);}

#status-msg{position:absolute;top:16%;left:50%;transform:translateX(-50%);background:rgba(10,8,30,.6);backdrop-filter:blur(16px);border:1.5px solid rgba(201,72,91,.4);color:#fff0e6;padding:11px 24px;border-radius:60px;font-size:clamp(.9rem,2.8vw,1.25rem);font-family:'Dancing Script',cursive;font-weight:700;z-index:100;text-shadow:0 2px 10px rgba(201,72,91,.5);white-space:nowrap;pointer-events:none;display:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis;}

/* SHARE OVERLAY */

#share-preview{width:100%;border-radius:12px;margin-bottom:12px;display:block;max-height:170px;object-fit:cover;}
#share-card h3{font-family:'Dancing Script',cursive;color:#fff0e6;font-size:clamp(1.05rem,4vw,1.45rem);margin:0 0 8px;}

.share-buttons{display:flex;flex-direction:column;gap:8px;}
.share-btn-row{display:flex;gap:8px;justify-content:center;}

.share-pill:hover{transform:scale(1.05);}
.share-pill.native{background:linear-gradient(135deg,var(--rose),#8b2252);color:#fff;box-shadow:0 3px 14px rgba(201,72,91,.45);}
.share-pill.whatsapp{background:linear-gradient(135deg,#25d366,#128c4a);color:#fff;}
.share-pill.telegram{background:linear-gradient(135deg,#2aabee,#1877b8);color:#fff;}
.share-pill.copy{background:linear-gradient(135deg,#c8963e,#7a5010);color:#fff;}
.share-pill.close-btn{background:rgba(255,255,255,.1);color:#fff0e6;border:1px solid rgba(255,255,255,.2);margin-top:2px;}

@keyframes floatGlow{0%{transform:translateY(0) scale(1);opacity:.9}100%{transform:translateY(-110px) scale(0);opacity:0}}
.sparkle{position:absolute;width:7px;height:7px;background:radial-gradient(circle,#f5c6cb,#c9485b);border-radius:50%;pointer-events:none;z-index:25;animation:floatGlow 1s ease-out forwards;}
@keyframes riseSmoke{0%{transform:translateY(0) scale(.5);opacity:.65}100%{transform:translateY(-160px) scale(2.2);opacity:0}}
.smoke-particle{position:absolute;width:22px;height:22px;background:radial-gradient(circle,rgba(253,246,238,.6),rgba(200,150,62,0));border-radius:50%;pointer-events:none;z-index:25;animation:riseSmoke 2.2s ease-out forwards;}

#copy-toast{position:absolute;bottom:22%;left:50%;transform:translateX(-50%);background:rgba(10,10,30,.88);color:#ffe8b0;font-family:'Dancing Script',cursive;font-size:1rem;padding:8px 22px;border-radius:30px;z-index:300;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}

<script>
// ── Wait for Three.js to be available ────────────────────────────────
(function waitForThree(){
  if(typeof THREE === 'undefined'){
    setTimeout(waitForThree, 80);
    return;
  }
  initCake();
})();

function initCake(){

// ── IDENTITY ─────────────────────────────────────────────────────────
const SENDER = 'Niharika Niha';

const LAYER_MSG = {
  2:(s,t)=>`${SENDER} saved Slice #${s} from the ✨ Top Layer especially for you 💖\nYou're one of her ${t} most precious people — her innermost circle 🌸`,
  1:(s,t)=>`${SENDER} saved Slice #${s} from the 🎂 Middle Layer especially for you 💖\nYou're one of her ${t} closest people — held dearly in her heart 💕`,
  0:(s,t)=>`${SENDER} saved Slice #${s} from the 🍰 Bottom Layer especially for you 💖\nYou're one of her ${t} cherished ones — always in her world 🌷`
};
const LAYER_NAMES = ['Bottom Layer','Middle Layer','Top Layer'];

// ── DOM ───────────────────────────────────────────────────────────────
const wrapper     = document.getElementById('canvas-wrapper');
const loading     = document.getElementById('loading-screen');
const statusMsg   = document.getElementById('status-msg');
const layerInfo   = document.getElementById('layer-info');
const blowBtn     = document.getElementById('blowBtn');
const cutBtn      = document.getElementById('cutBtn');
const copyToast   = document.getElementById('copy-toast');
const greetBanner = document.getElementById('greeting-banner');
const greetTitle  = document.getElementById('greeting-title');
const greetBadge  = document.getElementById('greeting-badge');
const greetBody   = document.getElementById('greeting-body');
const greetClose  = document.getElementById('greeting-close');
const shareOv     = document.getElementById('share-overlay');
const shareImg    = document.getElementById('share-preview');
const shareTitle  = document.getElementById('share-title');
const shareBody   = document.getElementById('share-body');
const btnNative   = document.getElementById('btn-native');
const btnSClose   = document.getElementById('btn-share-close');

function W(){ return wrapper.clientWidth; }
function H(){ return wrapper.clientHeight; }

// ── DEEP LINK ─────────────────────────────────────────────────────────
const params = new URLSearchParams(window.location.search);
const dlLayer = params.get('layer');
const dlSlice = parseInt(params.get('slice')||'0',10);
const layerKey = {top:2,middle:1,bottom:0};
const dlIdx   = (dlLayer && layerKey[dlLayer]!==undefined) ? layerKey[dlLayer] : -1;

if(dlIdx>=0 && dlSlice>0){
  const tot=[12,8,6][dlIdx];
  greetTitle.textContent='🎂 You got a slice!';
  greetBadge.textContent=`Slice #${dlSlice} · ${LAYER_NAMES[dlIdx]}`;
  greetBody.textContent=LAYER_MSG[dlIdx](dlSlice,tot).replace(/\n/g,' ');
  greetBanner.style.display='flex';
}
greetClose.addEventListener('click',()=>{ greetBanner.style.display='none'; });

// ── SCENE ─────────────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x111a2e);
scene.fog = new THREE.FogExp2(0x111a2e,0.010);

const renderer = new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
renderer.setSize(W(),H());
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.shadowMap.enabled=false;
wrapper.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(42,W()/H(),0.1,1000);
camera.position.set(0,4.5,7);
camera.lookAt(0,1.2,0);

// ── ORBIT CONTROLS (inline, no addon needed) ──────────────────────────
// We embed a minimal OrbitControls implementation to avoid addon import
const OC = createOrbitControls(camera, renderer.domElement);

// ── LIGHTS ────────────────────────────────────────────────────────────
scene.add(new THREE.AmbientLight(0x404060,0.4));
const mainL=new THREE.DirectionalLight(0xfff5e0,0.7);
mainL.position.set(4,8,4); scene.add(mainL);
const fill=new THREE.PointLight(0xd4a373,0.3);
fill.position.set(-3,3,-3); scene.add(fill);
const front=new THREE.PointLight(0xffcc99,0.2);
front.position.set(1.5,2,3); scene.add(front);
const candleLight=new THREE.PointLight(0xff8844,0.3,6);
candleLight.position.set(0,3.5,0); scene.add(candleLight);

// ── STARS ─────────────────────────────────────────────────────────────
const sg=new THREE.BufferGeometry();
const sp=new Float32Array(600*3);
for(let i=0;i<600;i++){sp[i*3]=(Math.random()-.5)*50;sp[i*3+1]=(Math.random()-.5)*15+3;sp[i*3+2]=(Math.random()-.5)*30-12;}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffccaa,size:0.04})));

// ── TABLE ─────────────────────────────────────────────────────────────
const tMat=new THREE.MeshStandardMaterial({color:0x7a5c38,roughness:0.85,metalness:0.05});
const tTop=new THREE.Mesh(new THREE.CylinderGeometry(2.9,2.9,0.22,48),tMat);
tTop.position.y=0; scene.add(tTop);
const lMat=new THREE.MeshStandardMaterial({color:0x5e4427,roughness:0.9});
for(let i=0;i<4;i++){
  const a=(i/4)*Math.PI*2;
  const lg=new THREE.Mesh(new THREE.CylinderGeometry(0.18,0.22,0.72,8),lMat);
  lg.position.set(Math.cos(a)*2.2,-0.47,Math.sin(a)*2.2);
  scene.add(lg);
}


// ── PLATE ─────────────────────────────────────────────────────────────
const plM=new THREE.MeshStandardMaterial({color:0x87CEEB,roughness:0.3,metalness:0.15});
const pl=new THREE.Mesh(new THREE.CylinderGeometry(1.70,1.70,0.06,48),plM);
pl.position.y=0.185; scene.add(pl);
const plR=new THREE.Mesh(new THREE.TorusGeometry(1.70,0.04,8,48),plM);
plR.rotation.x=Math.PI/2; plR.position.y=0.215; scene.add(plR);

// ── CAKE LAYERS ───────────────────────────────────────────────────────
const CAKE=[
  {r:1.35,h:0.55,y:0.53, color:0xf4b8c8,cream:0xfce8e0,slices:12,dot:0xc9485b,key:'bottom'},
  {r:1.05,h:0.48,y:1.045,color:0xf2aabf,cream:0xfee5dc,slices:8, dot:0x8b2252,key:'middle'},
  {r:0.78,h:0.40,y:1.485,color:0xf0a0b8,cream:0xffeee8,slices:6, dot:0xe8a0b8,key:'top'  },
];
const cMats  = CAKE.map(l=>new THREE.MeshStandardMaterial({color:l.color,roughness:0.95}));
const crMats = CAKE.map(l=>new THREE.MeshStandardMaterial({color:l.cream,roughness:1.0}));
const csM    = new THREE.MeshStandardMaterial({color:0xfce8e0,roughness:0.88});
const inM    = new THREE.MeshStandardMaterial({color:0xf2b0c4,roughness:0.8,side:THREE.DoubleSide});
const chocoM = new THREE.MeshStandardMaterial({color:0x5c2a0e,roughness:0.55,metalness:0.08});

const layerGrps=[];
const sliceGrps=[];


CAKE.forEach((L, li) => {
  // full layer
  const grp = new THREE.Group();
  const cyl = new THREE.Mesh(new THREE.CylinderGeometry(L.r, L.r, L.h, 64), cMats[li]);
  cyl.position.y = L.y; grp.add(cyl);
  const ct = new THREE.Mesh(new THREE.CylinderGeometry(L.r + .015, L.r + .015, .04, 64), crMats[li]);
  ct.position.y = L.y + L.h / 2 + .02; grp.add(ct);
  const dr = new THREE.Mesh(new THREE.TorusGeometry(L.r + .01, .04, 8, 64), csM);
  dr.rotation.x = Math.PI / 2; dr.position.y = L.y + L.h / 2 - .01; grp.add(dr);

  // ── Dots ──
  const step0 = (Math.PI * 2) / L.slices;
  for (let d = 0; d < L.slices; d++) {
    const mA = (d * step0 - Math.PI / 2) + step0 / 2;
    const dot = new THREE.Mesh(new THREE.SphereGeometry(.04, 8, 8), new THREE.MeshStandardMaterial({ color: L.dot }));
    dot.position.set(Math.cos(mA) * L.r * .55, L.y + L.h / 2 + .05, -Math.sin(mA) * L.r * .55);
    grp.add(dot);
  }

  // ── Chocolate Decorations (Full Cake) ──
  const decCount = L.slices; // Matches slice count
  const decStep = (Math.PI * 2) / decCount;
  for (let d = 0; d < decCount; d++) {
    const angle = d * decStep;
    const dec = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), chocoM);
    dec.position.set(Math.cos(angle) * L.r, L.y - L.h / 2 + 0.1, -Math.sin(angle) * L.r);
    grp.add(dec);
  }
  
  scene.add(grp);
  layerGrps.push(grp);

  // ── slices (hidden) ──
  const sg2=new THREE.Group(); sg2.visible=false;
  const step=(Math.PI*2)/L.slices;
  for(let s=0;s<L.slices;s++){
    const sA=s*step-Math.PI/2, eA=sA+step;
    const sg3=new THREE.Group();
    const sh=new THREE.Shape();
    sh.moveTo(0,0);
    for(let k=0;k<=24;k++){const a=sA+(eA-sA)*(k/24);sh.lineTo(Math.cos(a)*L.r,Math.sin(a)*L.r);}
    sh.lineTo(0,0);
    const geo=new THREE.ExtrudeGeometry(sh,{depth:L.h,bevelEnabled:false});
    geo.rotateX(-Math.PI/2); geo.translate(0,L.y-L.h/2,0);
    sg3.add(new THREE.Mesh(geo,[cMats[li],inM]));
    const ts=new THREE.Shape();
    ts.moveTo(0,0);
    for(let k=0;k<=24;k++){const a=sA+(eA-sA)*(k/24);ts.lineTo(Math.cos(a)*(L.r+.015),Math.sin(a)*(L.r+.015));}
    ts.lineTo(0,0);
    const tm=new THREE.Mesh(new THREE.ShapeGeometry(ts),crMats[li]);
    tm.rotation.x=-Math.PI/2; tm.position.y=L.y+L.h/2+.025; sg3.add(tm);
    const mA=(sA+eA)/2;
    
    // --- YOUR DOT DECORATION ---
    const d2=new THREE.Mesh(new THREE.SphereGeometry(.038,8,8),new THREE.MeshStandardMaterial({color:L.dot}));
    d2.position.set(Math.cos(mA)*L.r*.55, L.y+L.h/2+.065, -Math.sin(mA)*L.r*.55);
    sg3.add(d2);

    // --- YOUR OUTER EDGE DECORATION ---
    const dec = new THREE.Mesh(new THREE.SphereGeometry(0.06, 12, 12), chocoM);
    dec.position.set(Math.cos(mA) * L.r, L.y - L.h / 2 + 0.1, -Math.sin(mA) * L.r);
    sg3.add(dec);
    
    sg3.userData={tx:Math.cos(mA)*(L.r*.9+.6),tz:-Math.sin(mA)*(L.r*.9+.6),sliceNum:s+1,layerIdx:li};
    sg2.add(sg3);
  }

  // add slices group to scene (hidden until cutting)
  scene.add(sg2);
  sliceGrps.push(sg2);
});


// ── CANDLE ────────────────────────────────────────────────────────────
const topL=CAKE[2];
const cBaseY=topL.y+topL.h/2+.04;
const cY=cBaseY+.37;
const candleGrp=new THREE.Group();
const cbody=new THREE.Mesh(new THREE.CylinderGeometry(.11,.12,.7,24),
  new THREE.MeshStandardMaterial({color:0xfff0d0,emissive:0xffaa77,emissiveIntensity:.1}));
cbody.position.y=cY; candleGrp.add(cbody);
for(let i=0;i<5;i++){
  const str=new THREE.Mesh(new THREE.TorusGeometry(.115,.018,6,24),
    new THREE.MeshStandardMaterial({color:0xc9485b}));
  str.rotation.x=Math.PI/2; str.position.y=cY-.25+i*.13; candleGrp.add(str);
}
const wkY=cY+.37;
const wk=new THREE.Mesh(new THREE.CylinderGeometry(.02,.02,.08,6),
  new THREE.MeshStandardMaterial({color:0x331100}));
wk.position.y=wkY; candleGrp.add(wk);
const fMat=new THREE.MeshStandardMaterial({color:0xff6600,emissive:0xff4400,emissiveIntensity:.5,transparent:true,opacity:.92});
const flame=new THREE.Mesh(new THREE.ConeGeometry(.08,.2,20),fMat);
flame.position.y=wkY+.13; candleGrp.add(flame);
const ifMat=new THREE.MeshStandardMaterial({color:0xffcc44,emissive:0xff8800,emissiveIntensity:.7,transparent:true,opacity:.85});
const iFlame=new THREE.Mesh(new THREE.SphereGeometry(.045,12,12),ifMat);
iFlame.position.y=wkY+.15; candleGrp.add(iFlame);
candleLight.position.set(0,wkY+.12,0);
scene.add(candleGrp);

// ── STATE ─────────────────────────────────────────────────────────────
let lit=true, blown=false, cutting=false, curLayer=2;
const prog=[0,0,0];
const animQ=[];

// ── HELPERS ───────────────────────────────────────────────────────────
let stTimer=null;
function showSt(t,d=2800){statusMsg.textContent=t;statusMsg.style.display='block';clearTimeout(stTimer);stTimer=setTimeout(()=>statusMsg.style.display='none',d);}
function showLI(t){layerInfo.textContent=t;layerInfo.style.display='block';}
function hideLI(){layerInfo.style.display='none';}
function toast(){copyToast.classList.add('show');setTimeout(()=>copyToast.classList.remove('show'),2200);}
function addSmoke(){
  for(let i=0;i<28;i++){const s=document.createElement('div');s.className='smoke-particle';s.style.left=`calc(50% + ${(Math.random()-.5)*70}px)`;s.style.top=`calc(38% + ${Math.random()*30-50}px)`;wrapper.appendChild(s);setTimeout(()=>s.remove(),2200);}
}
function addSparks(){
  for(let i=0;i<45;i++){setTimeout(()=>{const s=document.createElement('div');s.className='sparkle';s.style.left=`${Math.random()*W()}px`;s.style.top=`${Math.random()*H()}px`;wrapper.appendChild(s);setTimeout(()=>s.remove(),1000);},i*28);}
}

// ── BLOW CANDLE ───────────────────────────────────────────────────────
function blow(){
  if(!lit)return; lit=false;
  const t0=performance.now();
  function a(now){
    const t=Math.min(1,(now-t0)/450),s=1-t;
    flame.scale.set(s,s,s); iFlame.scale.set(s,s,s);
    fMat.emissiveIntensity=.5*(1-t); ifMat.emissiveIntensity=.7*(1-t); candleLight.intensity=.5*(1-t);
    if(t<1){requestAnimationFrame(a);}
    else{flame.visible=false;iFlame.visible=false;candleLight.intensity=0;blown=true;blowBtn.disabled=true;cutBtn.disabled=false;showSt('🎈 Wish made! Now cut the cake 🔪',3500);}
  }
  requestAnimationFrame(a); addSmoke(); addSparks();
}
blowBtn.addEventListener('click',()=>lit?blow():showSt('💖 Wish already on its way!',2000));

// ── SHARE ─────────────────────────────────────────────────────────────
let shareData=null;

function buildURL(li,sn){
  const b=window.location.origin+window.location.pathname;
  return `${b}?layer=${CAKE[li].key}&slice=${sn}`;
}
function buildTxt(li,sn){
  return LAYER_MSG[li](sn,CAKE[li].slices);
}
function snap(){
  renderer.render(scene,camera);
  try{return renderer.domElement.toDataURL('image/png');}catch(e){return null;}
}
async function toFile(d,n){
  const r=await fetch(d);const b=await r.blob();return new File([b],n,{type:'image/png'});
}

function openShare(li,sn){
  const url=buildURL(li,sn);
  const txt=buildTxt(li,sn);
  const img=snap();
  shareData={url,txt,img};
  shareImg.src=img||''; shareImg.style.display=img?'block':'none';
  shareTitle.textContent=`🎂 Slice #${sn} · ${LAYER_NAMES[li]}`;
  shareBody.textContent=txt;
  btnNative.style.display=navigator.share?'block':'none';
  shareOv.style.display='flex';
}
function closeShare(){shareOv.style.display='none';}
btnSClose.addEventListener('click',closeShare);

btnNative.addEventListener('click',async()=>{
  if(!shareData||!navigator.share)return;
  // Share only message and picture - NO URL
  const o={title:`🎂 ${SENDER} has a birthday surprise for you!`,text:shareData.txt};
  if(shareData.img&&navigator.canShare){
    try{const f=await toFile(shareData.img,'cake.png');if(navigator.canShare({files:[f]}))o.files=[f];}catch(e){}
  }
  try{await navigator.share(o);closeShare();}catch(e){if(e.name!=='AbortError')console.warn(e);}
});
function fallbackCopy(t){
  const ta=document.createElement('textarea');ta.value=t;ta.style.cssText='position:fixed;opacity:0';
  document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);toast();
}

// ── CUT CAKE ──────────────────────────────────────────────────────────
function startLayer(li){
  curLayer=li; cutting=true;
  layerGrps[li].visible=false; sliceGrps[li].visible=true;
  if(li===2) candleGrp.visible=false;
  showLI(`✂️ ${LAYER_NAMES[li]} (${CAKE[li].slices} slices) — tap Cut!`);
}
function nextSlice(li){
  const idx=prog[li]; if(idx>=CAKE[li].slices)return false;
  const sg3=sliceGrps[li].children[idx]; if(!sg3)return false;
  animQ.push({g:sg3,tx:sg3.userData.tx,tz:sg3.userData.tz,p:0});
  prog[li]++;
  setTimeout(()=>openShare(li,idx+1),700);
  return true;
}
cutBtn.addEventListener('click',()=>{
  if(!blown){showSt('🕯️ Blow the candle first!',2000);return;}
  const li=curLayer;
  if(li<0){showSt('🎂 All layers cut! Enjoy! 🎊',3000);cutBtn.disabled=true;return;}
  if(!cutting)startLayer(li);
  nextSlice(li);
  const p=prog[li],tot=CAKE[li].slices;
  showLI(`✂️ ${LAYER_NAMES[li]}: ${p}/${tot} slices`);
  if(p>=tot){
    setTimeout(()=>{
      const nx=li-1;
      if(nx>=0){curLayer=nx;cutting=false;showSt(`🎉 ${LAYER_NAMES[li]} done! Cut next! `,2800);showLI(`🎂 Next: ${LAYER_NAMES[nx]} (${CAKE[nx].slices} slices) — tap Cut!`);}
      else{curLayer=-1;cutting=false;cutBtn.disabled=true;hideLI();showSt('🎊 All layers cut! Happy Birthday! 🎂✨',4500);}
    },400);
  }
});

// ── ANIMATION LOOP ────────────────────────────────────────────────────
let t2=0;
function animate(){
  requestAnimationFrame(animate); t2+=.022;
  if(lit){
    const f=.75+Math.sin(t2*28)*.18;
    flame.scale.set(1,f,1); iFlame.scale.set(1,.85+Math.sin(t2*35)*.2,1);
    fMat.emissiveIntensity=.35+Math.sin(t2*30)*.1; ifMat.emissiveIntensity=.5+Math.sin(t2*38)*.15;
    candleLight.intensity=.4+Math.sin(t2*20)*.12;
  }
  for(let i=animQ.length-1;i>=0;i--){
    const a=animQ[i]; a.p=Math.min(1,a.p+.045);
    const e=1-Math.pow(1-a.p,3);
    a.g.position.x=a.tx*e; a.g.position.z=a.tz*e; a.g.position.y=Math.sin(a.p*Math.PI)*.22;
    if(a.p>=1){a.g.visible=false;animQ.splice(i,1);}
  }
  OC.update();
  renderer.render(scene,camera);
}

// ── RESIZE ────────────────────────────────────────────────────────────
window.addEventListener('resize',()=>{
  camera.aspect=W()/H(); camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

// ── HIDE LOADING ──────────────────────────────────────────────────────
loading.style.display='none';

// ── START ─────────────────────────────────────────────────────────────
animate();

} // end initCake

// ════════════════════════════════════════════════════════════════════
//  MINIMAL ORBIT CONTROLS (no addon file needed)
// ════════════════════════════════════════════════════════════════════
function createOrbitControls(camera, domEl){
  const state={
    enabled:true, target:new THREE.Vector3(0,1.2,0),
    minDist:4, maxDist:16,
    minPolar:Math.PI*0.12, maxPolar:Math.PI*0.55,
    damping:0.06,
    _spherical:{r:0,phi:0,theta:0},
    _sphericalDelta:{phi:0,theta:0},
    _scale:1, _panOffset:new THREE.Vector3(),
    _rotating:false, _lastX:0, _lastY:0,
    _pinching:false, _lastPinchDist:0
  };

  // init spherical from camera
  const offset=new THREE.Vector3().subVectors(camera.position,state.target);
  state._spherical.r=offset.length();
  state._spherical.phi=Math.acos(Math.max(-1,Math.min(1,offset.y/state._spherical.r)));
  state._spherical.theta=Math.atan2(offset.x,offset.z);

  function getTouch2Dist(e){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    return Math.sqrt(dx*dx+dy*dy);
  }

  domEl.addEventListener('mousedown',e=>{
    if(!state.enabled)return; state._rotating=true; state._lastX=e.clientX; state._lastY=e.clientY;
  });
  window.addEventListener('mousemove',e=>{
    if(!state._rotating)return;
    const dx=e.clientX-state._lastX, dy=e.clientY-state._lastY;
    state._sphericalDelta.theta-=dx*.004; state._sphericalDelta.phi-=dy*.004;
    state._lastX=e.clientX; state._lastY=e.clientY;
  });
  window.addEventListener('mouseup',()=>state._rotating=false);

  domEl.addEventListener('wheel',e=>{
    e.preventDefault();
    state._scale*=e.deltaY>0?1.1:0.9;
  },{passive:false});

  domEl.addEventListener('touchstart',e=>{
    if(!state.enabled)return;
    if(e.touches.length===1){state._rotating=true;state._lastX=e.touches[0].clientX;state._lastY=e.touches[0].clientY;}
    else if(e.touches.length===2){state._rotating=false;state._pinching=true;state._lastPinchDist=getTouch2Dist(e);}
  },{passive:true});
  domEl.addEventListener('touchmove',e=>{
    if(e.touches.length===1&&state._rotating){
      const dx=e.touches[0].clientX-state._lastX, dy=e.touches[0].clientY-state._lastY;
      state._sphericalDelta.theta-=dx*.005; state._sphericalDelta.phi-=dy*.005;
      state._lastX=e.touches[0].clientX; state._lastY=e.touches[0].clientY;
    } else if(e.touches.length===2&&state._pinching){
      const d=getTouch2Dist(e);
      state._scale*=state._lastPinchDist/d; state._lastPinchDist=d;
    }
  },{passive:true});
  domEl.addEventListener('touchend',()=>{state._rotating=false;state._pinching=false;});

  const oc={
    update:function(){
      state._spherical.theta+=state._sphericalDelta.theta*state.damping;
      state._spherical.phi  +=state._sphericalDelta.phi  *state.damping;
      state._spherical.phi=Math.max(state.minPolar,Math.min(state.maxPolar,state._spherical.phi));
      state._spherical.r=Math.max(state.minDist,Math.min(state.maxDist,state._spherical.r*state._scale));
      state._scale=1+( state._scale-1)*( 1-state.damping );
      state._sphericalDelta.theta*=(1-state.damping);
      state._sphericalDelta.phi  *=(1-state.damping);
      const sinPhi=Math.sin(state._spherical.phi);
      camera.position.set(
        state.target.x+state._spherical.r*sinPhi*Math.sin(state._spherical.theta),
        state.target.y+state._spherical.r*Math.cos(state._spherical.phi),
        state.target.z+state._spherical.r*sinPhi*Math.cos(state._spherical.theta)
      );
      camera.lookAt(state.target);
    }
  };
  return oc;
}
</script>
